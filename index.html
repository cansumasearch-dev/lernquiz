ün, Blau–Orange, Gelb–Violett). Maximale Farbspannung, sehr lebendig. Tipp: Eine Farbe dominant einsetzen, die andere als kleinen Akzent.","keywords":["simultan","komplementär","grau","umgebung","gegenüberliegend","spannung","dominant","akzent"]}]},{"id":9,"title":"10 · Berechnungsaufgaben","shortTitle":"Berechnungen","questions":[{"type":"text","q":"Berechne die Dateigröße (unkomprimiert): Bild 3000 × 2000 px, RGB (3 Kanäle), 8 Bit.","modelAnswer":"Formel: Breite × Höhe × Kanäle × 1 Byte. Rechnung: 3000 × 2000 × 3 = 18.000.000 Byte. Umrechnung: 18.000.000 ÷ 1024 = 17.578 KB ÷ 1024 ≈ 17,2 MB.","keywords":["3000","2000","3","18","17,2","mb","byte","1024"]},{"type":"text","q":"Wie viele Pixel breit ist ein 10 cm breites Bild bei 300 ppi?","modelAnswer":"Formel: Pixel = cm ÷ 2,54 × ppi. Rechnung: 10 ÷ 2,54 × 300 = 3,937 × 300 = 1181 Pixel.","keywords":["10","2,54","300","1181","pixel"]},{"type":"text","q":"Ein Bild ist 1200 × 900 px. Es soll auf A5 (14,8 cm Breite) gedruckt werden. Welche effektive Auflösung ergibt sich und reicht sie für Offsetdruck?","modelAnswer":"Formel: ppi = Pixel × 2,54 ÷ cm. Rechnung: 1200 × 2,54 ÷ 14,8 = 3048 ÷ 14,8 ≈ 206 ppi. Ergebnis: 206 ppi < 300 ppi → NICHT ausreichend für Offsetdruck!","keywords":["1200","2,54","14,8","206","nicht ausreichend","300"]},{"type":"text","q":"Ein Bild hat 300 ppi und wird im Layout auf 150% skaliert. Wie hoch ist die effektive Auflösung? Reicht sie?","modelAnswer":"Formel: eff. ppi = Datei-ppi × (100 ÷ Skalierung%). Rechnung: 300 × (100 ÷ 150) = 300 × 0,667 = 200 ppi. Ergebnis: 200 ppi → NICHT ausreichend für Offsetdruck (Mindest: 300 ppi)!","keywords":["300","150","200","100","effektiv","nicht ausreichend"]},{"type":"text","q":"Berechne das Gewicht eines A4-Bogens (80 g/m²). A4 = 210 × 297 mm.","modelAnswer":"Formel: g/Bogen = g/m² × Fläche(m²). Fläche: 0,210 × 0,297 = 0,06237 m². Gewicht: 80 × 0,06237 = 4,99 g ≈ 5 g pro Bogen.","keywords":["0,210","0,297","0,0624","80","5","gramm","bogen"]},{"type":"text"," Answer":"g/m² = Grammatur = Gewicht des Papiers pro Quadratmeter. Je höher die Zahl, desto dicker und schwerer das Papier. Formel Bogengewicht: g/Bogen = g/m² × Fläche in m². Beispiel: A4 (0,210 × 0,297 = 0,0624 m²) bei 80 g/m² = 80 × 0,0624 = 5 g pro Bogen.","keywords":["g/m2","grammatur","fläche","bogen","formel","0,0624"]},{"type":"text","q":"Ein Bild ist 3000 px breit. Bei 300 ppi – wie breit ist es in cm?","modelAnswer":"Formel: cm = Pixel ÷ ppi × 2,54. Rechnung: 3000 ÷ 300 × 2,54 = 10 × 2,54 = 25,4 cm.","keywords":["3000","300","2,54","25,4","cm"]},{"type":"order","q":"Ordne die Schritte zur Berechnung der Dateigröße in die richtige Reihenfolge:","steps":["Breite in cm durch 2,54 teilen und mit ppi multiplizieren → Pixel Breite","Höhe in cm durch 2,54 teilen und mit ppi multiplizieren → Pixel Höhe","Breite × Höhe × Anzahl Kanäle (RGB=3, CMYK=4) multiplizieren → Bytes","Bytes durch 1024 teilen → Kilobyte (KB)","KB durch 1024 teilen → Megabyte (MB)"],"explanation":"Dateigröße berechnen: Pixel aus cm ermitteln (cm÷2,54×ppi), dann Breite×Höhe×Kanäle=Bytes, dann ÷1024=KB, ÷1024=MB. RGB=3 Kanäle, CMYK=4 Kanäle."},{"type":"order","q":"Ordne die Schritte zur Berechnung des Broschürengewichts in die richtige Reihenfolge:","steps":["Seitenzahl durch 4 teilen → Bogenanzahl","Breite (m) × Höhe (m) des Formats multiplizieren → Fläche in m²","g/m² × Fläche (m²) multiplizieren → Gramm pro Bogen","Gramm pro Bogen × Bogenanzahl multiplizieren → Gesamtgewicht"],"explanation":"Broschürengewicht: Bogen=Seiten÷4 → Fläche=B×H(m²) → g/Bogen=g/m²×Fläche → Gesamt=g/Bogen×Bogenanzahl."},{"type":"text","q":"Erkläre was die effektive Auflösung ist und berechne: 300 ppi Bild, auf 150% skaliert – was ist die effektive Auflösung?","modelAnswer":"Die effektive Auflösung ist die tatsächliche Auflösung eines Bildes nach der Skalierung im Layout. Die Datei-ppi allein reicht nicht – wenn man ein Bild größer zieht, sinkt die effektive Auflösung. Formel: eff. ppi = Datei-ppi × (100 ÷ Skalierung%). // ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let state = {
  currentTopic: 0,
  currentQuestion: 0,
  answers: {},
  completedTopics: [],
  mode: 'welcome',
  shuffledQuestions: {}
};

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
const QUESTIONS_PER_TOPIC = 6;

function freshState() {
  return {
    currentTopic: 0,
    currentQuestion: 0,
    answers: {},
    completedTopics: [],
    skippedTopics: [],   // topics where at least 1 question was skipped
    attemptCounts: {},   // attemptCounts[topicIdx][qIdx] = number of wrong attempts
    mode: 'welcome',
    shuffledQuestions: {}
  };
}

$(function () {
  renderSidebar();

  $('#btnStart').on('click', function () {
    state.mode = 'quiz';
    $('#viewWelcome').addClass('hidden');
    renderTopic(0);
  });

  $(document).on('click', '#btnResetAll', function () {
    state = freshState();
    // Reset sidebar nav states
    $('[data-topic]').off('click');
    renderSidebar();
    $('#viewQuiz').addClass('hidden');
    $('#viewWelcome').removeClass('hidden');
  });
});

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function renderSidebar() {
  const completed = state.completedTopics.length;
  const total = TOPICS.length;
  const pct = Math.round((completed / total) * 100);

  $('#overallPct').text(pct + '%');
  $('#overallFill').css('width', pct + '%');

  TOPICS.forEach(function (t, i) {
    const $item = $('[data-topic="' + i + '"]');
    const $status = $('[data-status="' + i + '"]');

    $item.removeClass('is-active is-completed is-locked is-available is-skipped');

    const isCompleted = state.completedTopics.includes(i);
    const isSkipped   = state.skippedTopics.includes(i);
    const isCurrent   = state.currentTopic === i && state.mode === 'quiz';
    const isLocked    = !isCompleted && !isSkipped && i > 0
                        && !state.completedTopics.includes(i - 1)
                        && !state.skippedTopics.includes(i - 1)
                        && i !== state.currentTopic;

    if (isCurrent && !isCompleted && !isSkipped) {
      $item.addClass('is-active');
      $status.html('<svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor"><circle cx="4" cy="4" r="3"/></svg>');
    } else if (isCompleted) {
      // Green – 100% correct, no skips
      $item.addClass('is-completed');
      $item.css('background', '').find('.topic-nav-item__status').css('color', '#15803D');
      $status.html('<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#15803D" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>');
      $item.off('click').on('click', function () { renderReview(i); });
      $item.css('pointer-events', 'auto').css('opacity', '1').css('cursor', 'pointer');
    } else if (isSkipped) {
      // Red – skipped at least one question
      $item.addClass('is-skipped');
      $status.html('<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>');
      $item.off('click').on('click', function () { renderReview(i); });
      $item.css('pointer-events', 'auto').css('opacity', '1').css('cursor', 'pointer');
    } else if (!isLocked) {
      $item.addClass('is-available');
      $status.html('');
    } else {
      $item.addClass('is-locked');
      $status.html('<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>');
    }
  });
}

// ═══════════════════════════════════════════════
// SHUFFLE HELPERS
// ═══════════════════════════════════════════════
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function buildShuffledTopic(topicIdx) {
  var topic = TOPICS[topicIdx];
  // Pick random subset of questions from the pool
  var allIndices = topic.questions.map(function(_, i){ return i; });
  var pickedIndices = shuffle(allIndices).slice(0, QUESTIONS_PER_TOPIC);
  return pickedIndices.map(function(origIdx) {
    var orig = topic.questions[origIdx];
    var q = JSON.parse(JSON.stringify(orig)); // deep clone
    if (q.type === 'radio' || q.type === 'checkbox') {
      // Shuffle option order and remap correct[]
      var optIndices = shuffle(orig.options.map(function(_, i){ return i; }));
      q.options = optIndices.map(function(i){ return orig.options[i]; });
      var oldToNew = {};
      optIndices.forEach(function(oldIdx, newIdx){ oldToNew[oldIdx] = newIdx; });
      q.correct = orig.correct.map(function(c){ return oldToNew[c]; }).sort(function(a,b){return a-b;});
    }
    return q;
  });
}

// Returns the (shuffled) question for a given topic+index
function getQ(topicIdx, qIdx) {
  if (state.shuffledQuestions && state.shuffledQuestions[topicIdx]) {
    return state.shuffledQuestions[topicIdx][qIdx];
  }
  return TOPICS[topicIdx].questions[qIdx];
}

function getQCount(topicIdx) {
  if (state.shuffledQuestions && state.shuffledQuestions[topicIdx]) {
    return state.shuffledQuestions[topicIdx].length;
  }
  return TOPICS[topicIdx].questions.length;
}

// ═══════════════════════════════════════════════
// RENDER TOPIC (Quiz Mode)
// ═══════════════════════════════════════════════
function renderTopic(topicIdx) {
  state.currentTopic = topicIdx;
  state.currentQuestion = 0;
  state.answers[topicIdx] = [];
  // Generate fresh random order on every (re)start
  state.shuffledQuestions = state.shuffledQuestions || {};
  state.shuffledQuestions[topicIdx] = buildShuffledTopic(topicIdx);
  state.mode = 'quiz';
  renderSidebar();
  renderQuestion(topicIdx, 0);
}

function renderQuestion(topicIdx, qIdx) {
  state.currentQuestion = qIdx;
  const topic = TOPICS[topicIdx];
  const q = getQ(topicIdx, qIdx);
  const total = getQCount(topicIdx);
  const progress = Math.round((qIdx / total) * 100);

  let html = `
    <div class="topic-header">
      <div class="topic-header__meta">Thema ${topicIdx + 1} von ${TOPICS.length}</div>
      <h1 class="topic-header__title">${topic.title}</h1>
      <div class="topic-header__progress-row">
        <div class="topic-header__progress-bar">
          <div class="topic-header__progress-fill" style="width:${progress}%"></div>
        </div>
        <span class="topic-header__progress-label">Frage ${qIdx + 1} / ${total}</span>
      </div>
    </div>
    <div class="question-card" id="questionCard">${buildQuestion(q, qIdx)}</div>
  `;

  $('#viewQuiz').removeClass('hidden').html(html);
  bindQuestionEvents(topicIdx, qIdx);
  mainContent().scrollTop(0);
}

function buildQuestion(q, qIdx) {
  let inner = `
    <div class="question-card__index">Frage ${qIdx + 1}</div>
    <div class="question-card__text">${q.q}</div>
  `;

  if (q.type === 'checkbox') {
    inner += `<div class="question-card__hint">Mehrere Antworten können richtig sein.</div>`;
  }
  if (q.type === 'order') {
    inner += `<div class="question-card__hint">Klicke die Schritte in der richtigen Reihenfolge an. Klick nochmal zum Rückgängigmachen.</div>`;
  }

  if (q.type === 'radio' || q.type === 'checkbox') {
    inner += `<ul class="options-list" id="optionsList">`;
    q.options.forEach(function (opt, i) {
      const inputType = q.type === 'radio' ? 'radio' : 'checkbox';
      inner += `
        <li class="option-item" data-idx="${i}">
          <input type="${inputType}" name="q${qIdx}" id="opt${i}" value="${i}" class="option-item__input">
          <div class="option-item__indicator ${q.type === 'checkbox' ? 'is-checkbox' : ''}" data-ind="${i}"></div>
          <label class="option-item__label">${opt}</label>
          <span class="option-item__mark" data-mark="${i}"></span>
        </li>`;
    });
    inner += `</ul>`;
    inner += `<div class="btn-row"><button class="btn btn--primary" id="btnCheck" disabled>Antwort prüfen</button></div>`;
  } else if (q.type === 'order') {
    // Shuffle steps for display
    var displayOrder = shuffle(q.steps.map(function(_,i){return i;}));
    inner += `<ul class="options-list" id="orderList">`;
    displayOrder.forEach(function(origIdx) {
      inner += `
        <li class="option-item order-item" data-orig="${origIdx}" style="cursor:pointer">
          <div class="option-item__indicator" style="min-width:24px;font-size:0.85rem;font-weight:700;border-radius:4px" data-pos-badge></div>
          <label class="option-item__label">${q.steps[origIdx]}</label>
        </li>`;
    });
    inner += `</ul>`;
    inner += `<div class="btn-row"><button class="btn btn--primary" id="btnCheckOrder" disabled>Reihenfolge prüfen</button></div>`;
  } else {
    // text
    inner += `
      <div class="text-answer">
        <textarea id="textInput" placeholder="Schreibe deine Antwort hier..." rows="5"></textarea>
      </div>
      <div class="btn-row"><button class="btn btn--primary" id="btnCheckText" disabled>Antwort prüfen</button></div>
    `;
  }

  return inner;
}

// ═══════════════════════════════════════════════
// EVENT BINDING
// ═══════════════════════════════════════════════
function bindQuestionEvents(topicIdx, qIdx) {
  const q = getQ(topicIdx, qIdx);

  if (q.type === 'radio') {
    // Click option-item for radio
    $(document).off('click.opt').on('click.opt', '.option-item', function () {
      if ($(this).hasClass('is-disabled')) return;
      const idx = $(this).data('idx');
      $('.option-item').removeClass('is-selected');
      $(this).addClass('is-selected');
      $('[data-ind]').removeClass('is-checked');
      $('[data-ind="' + idx + '"]').addClass('is-checked');
      $('input[name="q' + qIdx + '"][value="' + idx + '"]').prop('checked', true);
      $('#btnCheck').prop('disabled', false);
    });

    $('#btnCheck').on('click', function () {
      const selected = parseInt($('input[name="q' + qIdx + '"]:checked').val());
      evaluateMC(topicIdx, qIdx, [selected]);
    });

  } else if (q.type === 'checkbox') {
    $(document).off('click.opt').on('click.opt', '.option-item', function () {
      if ($(this).hasClass('is-disabled')) return;
      const idx = $(this).data('idx');
      const $input = $('input[name="q' + qIdx + '"][value="' + idx + '"]');
      const checked = !$input.prop('checked');
      $input.prop('checked', checked);
      $(this).toggleClass('is-selected', checked);
      $('[data-ind="' + idx + '"]').toggleClass('is-checked', checked);

      const anyChecked = $('input[name="q' + qIdx + '"]:checked').length > 0;
      $('#btnCheck').prop('disabled', !anyChecked);
    });

    $('#btnCheck').on('click', function () {
      const selected = [];
      $('input[name="q' + qIdx + '"]:checked').each(function () {
        selected.push(parseInt($(this).val()));
      });
      evaluateMC(topicIdx, qIdx, selected);
    });

  } else if (q.type === 'order') {
    var orderSelection = []; // array of origIdx in click order
    $(document).off('click.opt').on('click.opt', '.order-item', function() {
      if ($(this).hasClass('is-disabled')) return;
      var origIdx = parseInt($(this).data('orig'));
      var pos = orderSelection.indexOf(origIdx);
      if (pos !== -1) {
        // Deselect – remove and shift
        orderSelection.splice(pos, 1);
      } else {
        orderSelection.push(origIdx);
      }
      // Update badges
      $('.order-item').each(function() {
        var oi = parseInt($(this).data('orig'));
        var p  = orderSelection.indexOf(oi);
        var badge = $(this).find('[data-pos-badge]');
        if (p !== -1) {
          badge.text(p+1).css({'background':'#1A1A2E','color':'#fff','border-color':'#1A1A2E'});
          $(this).addClass('is-selected');
        } else {
          badge.text('').css({'background':'','color':'','border-color':''});
          $(this).removeClass('is-selected');
        }
      });
      $('#btnCheckOrder').prop('disabled', orderSelection.length !== q.steps.length);
    });

    $('#btnCheckOrder').on('click', function() {
      evaluateOrder(topicIdx, qIdx, orderSelection);
    });
  } else {
    // text
    $('#textInput').on('input', function () {
      $('#btnCheckText').prop('disabled', $(this).val().trim().length < 10);
    });

    $('#btnCheckText').on('click', function () {
      const userText = $('#textInput').val().trim();
      showModelAnswer(topicIdx, qIdx, userText);
    });
  }
}

// ═══════════════════════════════════════════════
// EVALUATE ORDER
// ═══════════════════════════════════════════════
function evaluateOrder(topicIdx, qIdx, userOrder) {
  const q = getQ(topicIdx, qIdx);
  // Correct order is 0,1,2,...,n-1
  const correct = q.steps.map(function(_,i){return i;});
  const isCorrect = JSON.stringify(userOrder) === JSON.stringify(correct);

  // Track attempts
  if (!state.attemptCounts[topicIdx]) state.attemptCounts[topicIdx] = {};
  if (!isCorrect) {
    state.attemptCounts[topicIdx][qIdx] = (state.attemptCounts[topicIdx][qIdx] || 0) + 1;
  }
  const attempts = state.attemptCounts[topicIdx][qIdx] || 0;

  state.answers[topicIdx][qIdx] = { userAnswer: userOrder, correct: isCorrect, type: 'order' };

  // Disable items and color them
  $('.order-item').addClass('is-disabled');
  $('.order-item').each(function() {
    var origIdx  = parseInt($(this).data('orig'));
    var userPos  = userOrder.indexOf(origIdx);
    var correctPos = origIdx; // correct position IS the origIdx (0=first, 1=second...)
    var badge = $(this).find('[data-pos-badge]');
    if (userPos === correctPos) {
      $(this).addClass('is-correct');
      badge.text(userPos+1).css({'background':'#15803D','color':'#fff','border-color':'#15803D'});
    } else {
      $(this).addClass('is-wrong');
      badge.text((userPos !== -1 ? userPos+1 : '?') + '→' + (correctPos+1)).css({'background':'#DC2626','color':'#fff','border-color':'#DC2626'});
    }
  });

  $('#btnCheckOrder').closest('.btn-row').remove();

  let feedbackHtml;
  if (isCorrect) {
    feedbackHtml = `<div class="feedback feedback--correct"><div class="feedback__icon">✓</div><div class="feedback__body"><div class="feedback__title">Richtige Reihenfolge!</div><div class="feedback__text">${q.explanation}</div></div></div>`;
  } else {
    const skipBtn = attempts >= 3
      ? `<button class="btn btn--ghost" id="btnSkip" style="color:#DC2626;border-color:#FECACA">⏭ Überspringen</button>`
      : `<span style="font-size:0.75rem;color:#6B7280">Noch ${3-attempts} Versuch(e) bis Skip</span>`;
    feedbackHtml = `<div class="feedback feedback--wrong"><div class="feedback__icon">✗</div><div class="feedback__body"><div class="feedback__title">Reihenfolge falsch. (Versuch ${attempts}/3) – rote Zahlen zeigen: deine Wahl → richtige Position</div><div class="feedback__text">${q.explanation}</div></div></div>`;
    feedbackHtml += `<div class="btn-row" style="margin-top:8px">${skipBtn}</div>`;
  }

  const nextLabel = qIdx + 1 < getQCount(topicIdx) ? 'Nächste Frage' : 'Ergebnis anzeigen';
  feedbackHtml += `<button class="btn btn--next" id="btnNext">${nextLabel}</button>`;
  $('#questionCard').append(feedbackHtml);

  $('#btnNext').on('click', function() { advanceQuestion(topicIdx, qIdx); });
  $('#btnSkip').on('click', function()  { skipQuestion(topicIdx, qIdx); });
}

// ═══════════════════════════════════════════════
// EVALUATE MC
// ═══════════════════════════════════════════════
function evaluateMC(topicIdx, qIdx, selected) {
  const q = getQ(topicIdx, qIdx);
  const correct = q.correct.slice().sort();
  const userSorted = selected.slice().sort();
  const isCorrect = JSON.stringify(correct) === JSON.stringify(userSorted);

  // Track attempt count
  if (!state.attemptCounts[topicIdx]) state.attemptCounts[topicIdx] = {};
  if (!isCorrect) {
    state.attemptCounts[topicIdx][qIdx] = (state.attemptCounts[topicIdx][qIdx] || 0) + 1;
  }
  const attempts = state.attemptCounts[topicIdx][qIdx] || 0;

  // Record answer
  state.answers[topicIdx][qIdx] = { userAnswer: selected, correct: isCorrect, type: q.type };

  // Disable all options
  $('.option-item').addClass('is-disabled');

  // Mark each option
  q.options.forEach(function (_, i) {
    const $item = $('.option-item[data-idx="' + i + '"]');
    const isSelected = selected.includes(i);
    const isCorrectOpt = q.correct.includes(i);

    $item.removeClass('is-selected');
    if (isSelected && isCorrectOpt) {
      $item.addClass('is-correct');
      $('[data-mark="' + i + '"]').text('✓');
    } else if (isSelected && !isCorrectOpt) {
      $item.addClass('is-wrong');
      $('[data-mark="' + i + '"]').text('✗');
    } else if (!isSelected && isCorrectOpt) {
      $item.addClass('is-missed');
      $('[data-mark="' + i + '"]').text('●');
    }
  });

  // Remove check button, show feedback
  $('#btnCheck').closest('.btn-row').remove();

  let feedbackHtml;
  if (isCorrect) {
    feedbackHtml = `
      <div class="feedback feedback--correct">
        <div class="feedback__icon">✓</div>
        <div class="feedback__body">
          <div class="feedback__title">Richtig!</div>
          <div class="feedback__text">${q.explanation}</div>
        </div>
      </div>`;
  } else {
    const attemptsLeft = 3 - attempts;
    const skipBtn = attempts >= 3
      ? `<button class="btn btn--ghost" id="btnSkip" style="color:#DC2626;border-color:#FECACA">⏭ Frage überspringen</button>`
      : (attemptsLeft > 0 ? `<span style="font-size:0.75rem;color:#6B7280">Noch ${attemptsLeft} Versuch(e) bis Skip möglich</span>` : '');
    feedbackHtml = `
      <div class="feedback feedback--wrong">
        <div class="feedback__icon">✗</div>
        <div class="feedback__body">
          <div class="feedback__title">Leider falsch.${attempts >= 3 ? ' (3 Versuche)' : ' (Versuch ' + attempts + '/3)'}</div>
          <div class="feedback__text">${q.explanation}</div>
        </div>
      </div>`;
    feedbackHtml += `<div class="btn-row" style="margin-top:8px">${skipBtn}</div>`;
  }

  const nextLabel = qIdx + 1 < getQCount(topicIdx) ? 'Nächste Frage' : 'Ergebnis anzeigen';
  feedbackHtml += `<button class="btn btn--next" id="btnNext">${nextLabel}</button>`;

  $('#questionCard').append(feedbackHtml);

  $('#btnNext').on('click', function () {
    advanceQuestion(topicIdx, qIdx);
  });

  $('#btnSkip').on('click', function () {
    skipQuestion(topicIdx, qIdx);
  });
}

function skipQuestion(topicIdx, qIdx) {
  // Mark as skipped
  state.answers[topicIdx][qIdx] = { userAnswer: null, correct: false, skipped: true, type: getQ(topicIdx, qIdx).type };
  if (!state.skippedTopics.includes(topicIdx)) {
    state.skippedTopics.push(topicIdx);
  }
  // Remove from completedTopics if it was there
  state.completedTopics = state.completedTopics.filter(function(t) { return t !== topicIdx; });
  renderSidebar();
  advanceQuestion(topicIdx, qIdx);
}

// ═══════════════════════════════════════════════
// SHOW MODEL ANSWER (text questions)
// ═══════════════════════════════════════════════
function showModelAnswer(topicIdx, qIdx, userText) {
  const q = getQ(topicIdx, qIdx);

  $('#textInput').prop('readonly', true);
  $('#btnCheckText').closest('.btn-row').remove();

  const modelHtml = `
    <div class="model-answer">
      <div class="model-answer__label">📋 Musterlösung</div>
      <div class="model-answer__text">${q.modelAnswer}</div>
    </div>
    <div class="self-eval">
      <span class="self-eval__label">Hattest du es richtig?</span>
      <button class="btn btn--success btn--sm" id="btnSelfCorrect">✓ Ja, richtig</button>
      <button class="btn btn--danger btn--sm" id="btnSelfWrong">✗ Nein, falsch</button>
    </div>
  `;

  $('#questionCard').append(modelHtml);

  $('#btnSelfCorrect').on('click', function () {
    recordTextAnswer(topicIdx, qIdx, userText, true);
  });

  $('#btnSelfWrong').on('click', function () {
    recordTextAnswer(topicIdx, qIdx, userText, false);
  });
}

function recordTextAnswer(topicIdx, qIdx, userText, isCorrect) {
  state.answers[topicIdx][qIdx] = { userAnswer: userText, correct: isCorrect, type: 'text' };

  $('.self-eval').remove();

  const feedbackHtml = isCorrect
    ? `<div class="feedback feedback--correct"><div class="feedback__icon">✓</div><div class="feedback__body"><div class="feedback__title">Super! Weiter so.</div></div></div>`
    : `<div class="feedback feedback--wrong"><div class="feedback__icon">✗</div><div class="feedback__body"><div class="feedback__title">Kein Problem – beim nächsten Mal sitzt es!</div></div></div>`;

  const nextLabel = qIdx + 1 < getQCount(topicIdx) ? 'Nächste Frage' : 'Ergebnis anzeigen';
  $('#questionCard').append(feedbackHtml + `<button class="btn btn--next" id="btnNext">${nextLabel}</button>`);

  $('#btnNext').on('click', function () {
    advanceQuestion(topicIdx, qIdx);
  });
}

// ═══════════════════════════════════════════════
// ADVANCE
// ═══════════════════════════════════════════════
function advanceQuestion(topicIdx, qIdx) {
  if (qIdx + 1 < getQCount(topicIdx)) {
    renderQuestion(topicIdx, qIdx + 1);
  } else {
    showTopicResult(topicIdx);
  }
}

// ═══════════════════════════════════════════════
// TOPIC RESULT
// ═══════════════════════════════════════════════
function showTopicResult(topicIdx) {
  const topic = TOPICS[topicIdx];
  const answers = state.answers[topicIdx] || [];
  const total = answers.length;
  const correct = answers.filter(function (a) { return a && a.correct; }).length;
  const skippedCount = answers.filter(function (a) { return a && a.skipped; }).length;
  const allCorrect = correct === total && total > 0 && skippedCount === 0;

  if (allCorrect) {
    if (!state.completedTopics.includes(topicIdx)) state.completedTopics.push(topicIdx);
    state.skippedTopics = state.skippedTopics.filter(function(t) { return t !== topicIdx; });
  } else if (skippedCount > 0) {
    if (!state.skippedTopics.includes(topicIdx)) state.skippedTopics.push(topicIdx);
    state.completedTopics = state.completedTopics.filter(function(t) { return t !== topicIdx; });
  }

  renderSidebar();

  const isLast = topicIdx === TOPICS.length - 1;
  let html = `
    <div class="topic-header">
      <div class="topic-header__meta">Thema ${topicIdx + 1} von ${TOPICS.length}</div>
      <h1 class="topic-header__title">${topic.title}</h1>
    </div>
    <div class="completion-screen">
      <span class="completion-screen__icon">${allCorrect ? '🎉' : '📝'}</span>
      <h2 class="completion-screen__title">${allCorrect ? 'Thema abgeschlossen!' : 'Noch nicht ganz…'}</h2>
      <p class="completion-screen__sub">Du hast ${correct} von ${total} Fragen richtig beantwortet.</p>
      <div class="completion-screen__score">
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num">${correct}</span>
          <span class="completion-screen__score-label">Richtig</span>
        </div>
        <div class="completion-screen__score-div"></div>
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num">${total - correct}</span>
          <span class="completion-screen__score-label">Falsch</span>
        </div>
        <div class="completion-screen__score-div"></div>
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num">${Math.round(correct / total * 100)}%</span>
          <span class="completion-screen__score-label">Score</span>
        </div>
      </div>`;

  if (!allCorrect) {
    const skipMsg = skippedCount > 0
      ? `<br>⚠️ ${skippedCount} Frage(n) übersprungen – im Sidebar als 🔴 markiert.`
      : '';
    const canSkipForward = skippedCount > 0 || correct > 0; // allow going forward if partial
    html += `
      <div class="completion-screen__error-msg">
        ${skippedCount > 0
          ? '⏭ Du hast ' + skippedCount + ' Frage(n) übersprungen. Das Thema ist im Menü rot markiert.'
          : 'Nicht alle Fragen richtig – wiederholen für 100%!'
        }
        ${skipMsg}
      </div>
      <div class="btn-row" style="justify-content:center;gap:12px">
        <button class="btn btn--primary" id="btnRetry">🔄 Thema wiederholen</button>
        <button class="btn btn--secondary" id="btnReviewCurrent">Antworten ansehen</button>
        ${!isLast ? `<button class="btn btn--ghost" id="btnNextTopic" style="border-color:#E5E7EB">Weiter →</button>` : `<button class="btn btn--ghost" id="btnAllDone" style="border-color:#E5E7EB">Zum Abschluss →</button>`}
      </div>`;
  } else {
    let nextBtns = `<div class="btn-row" style="justify-content:center;gap:12px">`;
    nextBtns += `<button class="btn btn--secondary" id="btnReviewCurrent">Antworten ansehen</button>`;
    if (!isLast) {
      nextBtns += `<button class="btn btn--primary" id="btnNextTopic">Nächstes Thema ✓</button>`;
    } else {
      nextBtns += `<button class="btn btn--primary" id="btnAllDone">Alle Themen abgeschlossen 🎓</button>`;
    }
    nextBtns += `</div>`;
    html += nextBtns;
  }

  html += `</div>`;
  $('#viewQuiz').html(html);
  mainContent().scrollTop(0);

  $('#btnRetry').on('click', function () {
    state.answers[topicIdx] = [];
    renderTopic(topicIdx);
  });

  $('#btnNextTopic').on('click', function () {
    renderTopic(topicIdx + 1);
  });

  $('#btnReviewCurrent').on('click', function () {
    renderReview(topicIdx);
  });

  $('#btnAllDone').on('click', function () {
    showAllDone();
  });
}

// ═══════════════════════════════════════════════
// REVIEW
// ═══════════════════════════════════════════════
function renderReview(topicIdx) {
  const topic = TOPICS[topicIdx];
  const answers = state.answers[topicIdx] || [];
  const isCompleted = state.completedTopics.includes(topicIdx);
  const isSkipped   = state.skippedTopics.includes(topicIdx);

  let html = `
    <div class="review-header">
      <h1 class="review-header__title">${topic.title}</h1>
      <span class="review-header__badge" style="${isCompleted ? 'background:#DCFCE7;color:#15803D;border-color:#B5DFC8' : (isSkipped ? 'background:#FEE2E2;color:#DC2626;border-color:#FECACA' : '')}">
        ${isCompleted ? '✓ Abgeschlossen' : (isSkipped ? '⏭ Mit Skips' : 'Ausstehend')}
      </span>
    </div>`;

  var reviewQuestions = (state.shuffledQuestions && state.shuffledQuestions[topicIdx])
    ? state.shuffledQuestions[topicIdx]
    : topic.questions;
  reviewQuestions.forEach(function (q, i) {
    const ans = answers[i];
    const wasCorrect = ans && ans.correct;
    let userAnswerText = '–';
    let correctAnswerText = '';

    if (ans) {
      if (q.type === 'text') {
        userAnswerText = ans.userAnswer || '–';
        correctAnswerText = q.modelAnswer;
      } else if (q.type === 'order') {
        if (ans.skipped) {
          userAnswerText = '⏭ Übersprungen';
        } else {
          userAnswerText = (ans.userAnswer || []).map(function(idx,pos){ return (pos+1)+'. '+q.steps[idx]; }).join(' → ');
        }
        correctAnswerText = q.steps.map(function(s,i){ return (i+1)+'. '+s; }).join(' → ');
      } else {
        const selectedLabels = (ans.userAnswer || []).map(function (idx) { return q.options[idx]; }).join(', ');
        userAnswerText = selectedLabels || '–';
        correctAnswerText = q.correct.map(function (idx) { return q.options[idx]; }).join(', ');
      }
    }

    html += `
      <div class="review-card">
        <div class="review-card__top">
          <span class="review-card__q-index">Frage ${i + 1}</span>
          ${ans
            ? (ans.skipped
              ? '<span class="review-card__status wrong" style="background:#FEF3C7;color:#92400E;border-color:#FDE68A">⏭ Übersprungen</span>'
              : `<span class="review-card__status ${wasCorrect ? 'correct' : 'wrong'}">${wasCorrect ? '✓ Richtig' : '✗ Falsch'}</span>`)
            : '<span class="review-card__status wrong">Nicht beantwortet</span>'
          }
        </div>
        <div class="review-card__question">${q.q}</div>
        <div class="review-card__answer-row">
          <div class="review-card__answer-block user-answer">
            <div class="review-card__answer-label">Deine Antwort</div>
            ${userAnswerText}
          </div>
          <div class="review-card__answer-block correct-answer">
            <div class="review-card__answer-label">Richtige Antwort</div>
            ${correctAnswerText}
          </div>
        </div>
      </div>`;
  });

  // Back button
  const canContinue = !isCompleted && state.completedTopics.includes(topicIdx - 1) || topicIdx === 0;
  html += `
    <div class="btn-row" style="margin-top:24px;gap:12px">
      <button class="btn btn--secondary" id="btnBackFromReview">← Zurück</button>
      ${!isCompleted ? `<button class="btn btn--primary" id="btnRetryFromReview" data-topic="${topicIdx}">Thema wiederholen</button>` : ''}
    </div>`;

  $('#viewQuiz').removeClass('hidden').html(html);
  mainContent().scrollTop(0);

  $('#btnBackFromReview').on('click', function () {
    if (state.mode === 'quiz' || state.completedTopics.length > 0) {
      const lastActive = state.currentTopic;
      renderQuestion(lastActive, state.currentQuestion < TOPICS[lastActive].questions.length ? state.currentQuestion : 0);
    } else {
      showTopicResult(topicIdx);
    }
    // Go back to current quiz state sensibly
    const activeTopic = state.completedTopics.includes(topicIdx)
      ? (topicIdx + 1 < TOPICS.length ? topicIdx + 1 : topicIdx)
      : topicIdx;
    if (state.completedTopics.includes(topicIdx) && topicIdx + 1 < TOPICS.length && !state.completedTopics.includes(topicIdx + 1)) {
      renderTopic(topicIdx + 1);
    } else {
      showTopicResult(topicIdx);
    }
  });

  $('#btnRetryFromReview').on('click', function () {
    const t = parseInt($(this).data('topic'));
    state.answers[t] = [];
    renderTopic(t);
  });
}

// ═══════════════════════════════════════════════
// ALL DONE
// ═══════════════════════════════════════════════
function showAllDone() {
  let totalQ = 0;
  let totalCorrect = 0;
  TOPICS.forEach(function (t, i) {
    const ans = state.answers[i] || [];
    totalQ += ans.length;
    ans.forEach(function (a) { if (a && a.correct) totalCorrect++; });
  });

  const totalSkipped = state.skippedTopics.length;
  const allPerfect = state.completedTopics.length === TOPICS.length && totalSkipped === 0;
  const icon = allPerfect ? '🎓' : (totalSkipped > 0 ? '📋' : '✅');
  const title = allPerfect ? 'Perfekt! Alle Themen 100% abgeschlossen!'
    : (totalSkipped > 0 ? 'Durchgang abgeschlossen – einige Themen übersprungen' : 'Alle Themen abgeschlossen!');

  // Build per-topic retry buttons
  let topicBtns = '<div style="margin:20px 0 24px">';
  topicBtns += '<p style="font-size:0.8rem;color:#6B7280;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px">Einzelne Themen wiederholen:</p>';
  topicBtns += '<div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">';
  TOPICS.forEach(function(t, i) {
    const isDone = state.completedTopics.includes(i);
    const isSkip = state.skippedTopics.includes(i);
    const col = isDone ? '#15803D' : (isSkip ? '#DC2626' : '#2563EB');
    const bg  = isDone ? '#DCFCE7' : (isSkip ? '#FEE2E2' : '#DBEAFE');
    const lbl = isDone ? '✓' : (isSkip ? '⏭' : '○');
    topicBtns += `<button class="btn btn--sm btn-retry-topic" data-topicidx="${i}"
      style="background:${bg};color:${col};border-color:${col}30">
      ${lbl} ${t.shortTitle}
    </button>`;
  });
  topicBtns += '</div></div>';

  const html = `
    <div class="completion-screen" style="margin-top:20px">
      <span class="completion-screen__icon">${icon}</span>
      <h2 class="completion-screen__title">${title}</h2>
      <p class="completion-screen__sub">Du hast ${state.completedTopics.length} von ${TOPICS.length} Themen perfekt abgeschlossen.</p>
      <div class="completion-screen__score">
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num">${totalCorrect}</span>
          <span class="completion-screen__score-label">Richtig</span>
        </div>
        <div class="completion-screen__score-div"></div>
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num">${totalQ}</span>
          <span class="completion-screen__score-label">Gesamt</span>
        </div>
        <div class="completion-screen__score-div"></div>
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num">${totalQ > 0 ? Math.round(totalCorrect / totalQ * 100) : 0}%</span>
          <span class="completion-screen__score-label">Score</span>
        </div>
        ${totalSkipped > 0 ? `
        <div class="completion-screen__score-div"></div>
        <div class="completion-screen__score-item">
          <span class="completion-screen__score-num" style="color:#DC2626">${totalSkipped}</span>
          <span class="completion-screen__score-label">Übersprungen</span>
        </div>` : ''}
      </div>
      ${topicBtns}
      <div class="btn-row" style="justify-content:center;gap:12px">
        <button class="btn btn--primary" id="btnResetAll">↺ Komplett neu starten</button>
        ${totalSkipped > 0 ? `<button class="btn btn--secondary" id="btnRetrySkipped">🔴 Übersprungene wiederholen</button>` : ''}
      </div>
    </div>`;

  $('#viewQuiz').html(html);
  renderSidebar();
  mainContent().scrollTop(0);

  // Per-topic retry
  $(document).on('click', '.btn-retry-topic', function() {
    const t = parseInt($(this).data('topicidx'));
    state.answers[t] = [];
    state.skippedTopics = state.skippedTopics.filter(function(x){return x!==t;});
    if(state.attemptCounts[t]) state.attemptCounts[t] = {};
    renderTopic(t);
  });

  // Retry all skipped
  $('#btnRetrySkipped').on('click', function() {
    const firstSkipped = state.skippedTopics[0];
    if (firstSkipped !== undefined) {
      state.answers[firstSkipped] = [];
      if(state.attemptCounts[firstSkipped]) state.attemptCounts[firstSkipped] = {};
      renderTopic(firstSkipped);
    }
  });
}

// ═══════════════════════════════════════════════
// HELPER
// ═══════════════════════════════════════════════
function mainContent() { return $('#mainContent'); }
</script>
