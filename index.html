const TOPICS = [{"id":0,"title":"1 · Wirtschaftlichkeit, Nachhaltigkeit & Digitalisierung","shortTitle":"Wirtschaft & Digital","questions":[{"type":"checkbox","q":"Welche der folgenden Punkte sind VORTEILE der Digitalisierung?","options":["Effizienzsteigerung durch Automatisierung","Hohe Investitionskosten für Hard-/Software","Remote Work / ortsunabhängiges Arbeiten","Neue Geschäftsmodelle (E-Commerce, digitale Medien)","Abhängigkeit von Technologie & Internet","Kostensenkung durch digitale Prozesse"],"correct":[0,2,3,5],"explanation":"Vorteile: Effizienzsteigerung, Remote Work, neue Geschäftsmodelle, Kostensenkung, bessere Kundenkommunikation. Hohe Investitionskosten und Abhängigkeit von Technologie sind RISIKEN."},{"type":"checkbox","q":"Welche Punkte sind HERAUSFORDERUNGEN oder RISIKEN der Digitalisierung?","options":["Bessere Kundenkommunikation","Datenschutz & IT-Sicherheit (Cyberangriffe)","Qualifikationslücken → Mitarbeiter schulen","Remote Work","Jobverlust durch Automatisierung","Kostensenkung"],"correct":[1,2,4],"explanation":"Herausforderungen/Risiken: Datenschutz/IT-Sicherheit, Qualifikationslücken, Jobverlust durch Automatisierung, hohe Investitionskosten, Abhängigkeit von Technologie."},{"type":"radio","q":"Was beschreibt die 20-20-20-Regel am Bildschirmarbeitsplatz?","options":["Alle 20 Stunden → 20 Minuten Pause bei 20 °C Raumtemperatur","Alle 20 Minuten → 20 Sekunden auf ein ca. 6 m entferntes Objekt schauen","Monitorabstand 20 cm, 20° Neigung, 20 Lux Beleuchtung","Alle 20 Minuten aufstehen und 20 Schritte gehen"],"correct":[1],"explanation":"20-20-20-Regel: Alle 20 Minuten → 20 Sekunden auf ein ca. 6 m (20 Fuß) entferntes Objekt schauen. Entlastet die Augenmuskulatur und beugt Überanstrengung vor."},{"type":"radio","q":"Was regelt die BildscharbV?","options":["Die maximale Arbeitszeit am Bildschirm pro Tag","Mindestanforderungen an Ergonomie und Beleuchtung am Bildschirmarbeitsplatz","Die Pflicht zur regelmäßigen Prüfung elektrischer Geräte","Die Mindestgröße von Bildschirmen in Büros"],"correct":[1],"explanation":"BildscharbV (Bildschirmarbeitsverordnung): Regelt Mindestanforderungen an Ergonomie, Beleuchtung und Gestaltung von Bildschirmarbeitsplätzen."},{"type":"radio","q":"Wofür steht DGUV V3?","options":["Deutsche Grundsätze für Umwelt- und Verbraucherschutz","Vorschrift zur regelmäßigen Prüfung elektrischer Betriebsmittel","Digitale Grundlagen für Unternehmensverordnung","Verordnung zur Datensicherheit in Druckbetrieben"],"correct":[1],"explanation":"DGUV V3: Vorschrift der Deutschen Gesetzlichen Unfallversicherung für die regelmäßige Prüfung elektrischer Betriebsmittel und Anlagen."},{"type":"checkbox","q":"Welche Maßnahmen gehören zur Nachhaltigkeit im Bereich Papier & Druck?","options":["FSC- oder PEFC-zertifiziertes Papier verwenden","Recyclingpapier einsetzen","Vegetabilische Druckfarben nutzen","Möglichst viele Sonderfarben einsetzen","Ausschließlich Hochglanzpapier verwenden","Grüne Rechenzentren für Cloud-Dienste nutzen"],"correct":[0,1,2],"explanation":"Nachhaltigkeit Papier & Druck: Recyclingpapier, FSC-/PEFC-Zertifizierung, vegetabilische Druckfarben. Grüne Rechenzentren gehören zum Bereich Energie."},{"type":"radio","q":"Was bedeutet FSC- oder PEFC-Zertifizierung bei Papier?","options":["Das Papier ist besonders glatt und druckgeeignet","Das Papier stammt aus nachhaltig bewirtschafteten Wäldern","Das Papier ist recycelt aus Altpapier","Das Papier erfüllt den ISO-Druckstandard"],"correct":[1],"explanation":"FSC und PEFC zertifizieren nachhaltige Forstwirtschaft – das Holz stammt aus verantwortungsvollem Anbau wo für jeden gefällten Baum neue gepflanzt werden."},{"type":"radio","q":"Welcher Monitorabstand ist laut Ergonomie-Empfehlung korrekt?","options":["20–30 cm","50–70 cm","80–100 cm","Mehr als 1 Meter"],"correct":[1],"explanation":"Empfohlener Monitorabstand: 50–70 cm. Die Oberkante des Monitors sollte auf Augenhöhe sein, nicht darüber."},{"type":"text","q":"Nenne drei konkrete Maßnahmen für einen ergonomisch korrekten Bildschirmarbeitsplatz.","modelAnswer":"Monitor auf Augenhöhe (Oberkante), Abstand 50–70 cm, aufrechte Sitzposition (Rücken gerade, Füße flach), regelmäßige Pausen (20-20-20-Regel), indirekte Beleuchtung ohne Spiegelung, ergonomischer Stuhl mit Lordosenstütze.","keywords":["augenhöhe","abstand","sitzposition","pause","beleuchtung","50","70"]},{"type":"radio","q":"Was ist eine nachhaltige Maßnahme im Bereich Distribution?","options":["Ausschließlich Hochglanzpapier nutzen","Printmailings durch digitale PDFs ersetzen und regionale Druckereien bevorzugen","Größere Auflagen drucken für bessere Skalierung","Mehr Sonderfarben einsetzen"],"correct":[1],"explanation":"Nachhaltigkeit Distribution: Print durch Digital ersetzen (PDF statt Printmailing) und regionale Druckereien nutzen um Transportwege zu reduzieren."},{"type":"text","q":"Erkläre in eigenen Worten einen Vorteil UND ein Risiko der Digitalisierung für Medienbetriebe.","modelAnswer":"Vorteil z.B.: Effizienzsteigerung durch Automatisierung von Prozessen spart Zeit und Kosten. Oder: Remote Work ermöglicht ortsunabhängiges Arbeiten. Risiko z.B.: Datenschutz und IT-Sicherheit – digitale Systeme sind anfällig für Cyberangriffe. Oder: Abhängigkeit von Technologie – bei Systemausfall steht der Betrieb still.","keywords":["effizienz","automatisierung","remote","datenschutz","sicherheit","abhängigkeit"]},{"type":"checkbox","q":"Welche Aussagen zur Arbeitssicherheit am Bildschirmarbeitsplatz sind korrekt?","options":["Monitor sollte auf Augenhöhe stehen","Empfohlener Abstand zum Monitor: 50–70 cm","Je heller die direkte Beleuchtung, desto besser","Die 20-20-20-Regel schont die Augen","DGUV V3 regelt die Prüfung elektrischer Betriebsmittel","Bildschirmarbeit ohne Pausen ist kein Problem"],"correct":[0,1,3,4],"explanation":"Korrekt: Augenhöhe, 50–70 cm Abstand, 20-20-20-Regel, DGUV V3 für Elektroprüfung. Direkte helle Beleuchtung verursacht Spiegelung – indirekte Beleuchtung ist besser."},{"type":"checkbox","q":"Welche Maßnahmen reduzieren den ökologischen Fußabdruck eines Medienbetriebs?","options":["Recyclingpapier verwenden","Möglichst viele Druckveredelungen einsetzen","Print durch digitale Kommunikation ersetzen wo möglich","Regionale Druckereien bevorzugen","Immer die größte verfügbare Auflage drucken","Energieeffiziente Hardware und Ökostrom nutzen"],"correct":[0,2,3,5],"explanation":"Ökologische Maßnahmen: Recyclingpapier, Digitalisierung statt Print, regionale Partner, energieeffiziente Geräte und Ökostrom, grüne Rechenzentren."},{"type":"radio","q":"Welchen Bereich deckt die Nachhaltigkeit durch \"grüne Rechenzentren\" ab?","options":["Papier & Druck","Energie","Distribution","Personal"],"correct":[1],"explanation":"Grüne Rechenzentren gehören zum Nachhaltigkeitsbereich Energie – neben Ökostrom und energieeffizienten Geräten."},{"type":"order","q":"Bringe die Maßnahmen für Nachhaltigkeit in die richtige Kategorie-Reihenfolge (von Papier über Energie zu Distribution):","steps":["Recyclingpapier und FSC-zertifiziertes Papier verwenden","Ökostrom und energieeffiziente Geräte nutzen","Print durch digitale PDFs ersetzen und regionale Druckereien bevorzugen"],"explanation":"Drei Nachhaltigkeitsbereiche: 1. Papier & Druck (Recyclingpapier, FSC/PEFC, vegetabilische Farben), 2. Energie (Ökostrom, energieeff. Geräte, grüne Rechenzentren), 3. Distribution (PDF statt Print, regionale Druckereien)."},{"type":"order","q":"Ordne die Schritte der Arbeitssicherheit nach Wichtigkeit – zuerst der Bildschirm-Abstand, dann die Regelung, dann die Augen-Regel:","steps":["Monitor auf Augenhöhe, 50–70 cm Abstand, aufrechte Sitzposition","BildscharbV regelt Mindestanforderungen an Ergonomie & Beleuchtung","20-20-20-Regel: alle 20 Min. → 20 Sek. auf 6 m entferntes Objekt schauen"],"explanation":"Arbeitssicherheit am Bildschirm: Physische Ergonomie (Abstand, Haltung), gesetzliche Grundlage (BildscharbV), aktive Pausen (20-20-20-Regel), Gerätesicherheit (DGUV V3)."},{"type":"text","q":"Erkläre in eigenen Worten: Was ist Digitalisierung und was sind die wichtigsten Vorteile für einen Medienbetrieb?","modelAnswer":"Digitalisierung bedeutet die Umstellung von analogen auf digitale Prozesse, Produkte und Geschäftsmodelle. Für Medienbetriebe: Effizienzsteigerung durch Automatisierung (z.B. automatischer Preflight), neue Geschäftsmodelle (E-Commerce, digitale Medien), Remote Work (ortsunabhängiges Arbeiten), bessere Kundenkommunikation und Kostensenkung durch digitale Prozesse.","keywords":["digital","automatisierung","effizienz","geschäftsmodell","remote","kosten"]},{"type":"text","q":"Was ist die DGUV V3 und warum ist sie für Medienbetriebe relevant?","modelAnswer":"DGUV V3 ist eine Vorschrift der Deutschen Gesetzlichen Unfallversicherung. Sie schreibt die regelmäßige Prüfung elektrischer Betriebsmittel und Anlagen vor. In Medienbetrieben gibt es viele elektrische Geräte (Computer, Monitore, Drucker, Beleuchtung) – die müssen regelmäßig von einer Elektrofachkraft geprüft werden um Sicherheitsrisiken zu vermeiden.","keywords":["elektrisch","prüfung","betriebsmittel","unfallversicherung","sicherheit","regelmäßig"]}]},{"id":1,"title":"2 · Arbeitsschritte planen & Arbeitsmittel auswählen","shortTitle":"Arbeitsplanung","questions":[{"type":"radio","q":"Was ist der Unterschied zwischen Briefing und Re-Briefing?","options":["Briefing ist intern, Re-Briefing geht an den Kunden","Beim Briefing erhält die Agentur die Aufgabe; beim Re-Briefing spiegelt die Agentur den Auftrag zurück um Missverständnisse zu klären","Das Re-Briefing findet erst nach der Reinzeichnung statt","Beide bedeuten dasselbe"],"correct":[1],"explanation":"Briefing: Kunde erklärt Aufgabe, Ziele, Budget, Termine. Re-Briefing: Agentur wiederholt das Gehörte in eigenen Worten – Missverständnisse werden aufgedeckt bevor Arbeit beginnt."},{"type":"radio","q":"In welchem Workflow-Schritt wird die druckfertige Umsetzung nach Freigabe erstellt?","options":["Briefing","Präsentation","Reinzeichnung","Abnahme"],"correct":[2],"explanation":"Reinzeichnung (Schritt 5): Druckfertige, technisch saubere Umsetzung des freigegebenen Entwurfs. Alle Details werden korrekt ausgearbeitet."},{"type":"checkbox","q":"Was muss auf einer Rechnung als Pflichtangabe stehen?","options":["Absender und Empfänger","Verwendete Software","Datum","Fortlaufende Rechnungsnummer","Leistungsbeschreibung","Netto, MwSt. und Bruttobetrag","Zahlungsziel"],"correct":[0,2,3,4,5,6],"explanation":"Pflichtangaben Rechnung: Absender/Empfänger, Datum, fortlaufende Nummer, Leistungsbeschreibung, Netto/MwSt./Brutto, Zahlungsziel, Bankverbindung. Software ist keine Pflichtangabe."},{"type":"radio","q":"Welche Betriebsform nutzt agile Methoden wie Scrum und Kanban?","options":["Druckerei","Werbeagentur","Digitalagentur","Verlag"],"correct":[2],"explanation":"Digitalagentur: Fokus auf Web, Apps, Social Media, UX/UI. Nutzt agile Methoden wie Scrum und Kanban für iterative Entwicklung."},{"type":"radio","q":"Was ist die \"Abnahme\" im Produktionsworkflow?","options":["Die interne Qualitätskontrolle der Reinzeichnung","Die schriftliche Freigabe durch den Kunden – dient als Rechtsgrundlage","Das Abholen der fertigen Druckprodukte","Die Übergabe der Daten an die Druckerei"],"correct":[1],"explanation":"Abnahme (Schritt 6): Schriftliche Freigabe durch den Kunden. Wichtig als Rechtsgrundlage – danach liegt die Verantwortung für Fehler beim Kunden."},{"type":"radio","q":"Was macht ein Verlag?","options":["Erstellt Werbemittel für Unternehmen","Druckt und verarbeitet Papier zu Produkten","Erstellt, lektoriert und vertreibt Bücher, Zeitschriften und Online-Portale","Entwickelt Websites und Apps"],"correct":[2],"explanation":"Verlag: Erstellt (inhaltlich), lektoriert (prüft/korrigiert) und vertreibt redaktionelle Inhalte wie Bücher, Zeitschriften und Online-Portale."},{"type":"text","q":"Erkläre den Workflow-Schritt \"Konzept/Entwurf\": Was passiert in diesem Schritt?","modelAnswer":"Im Schritt Konzept/Entwurf werden nach dem Briefing erste Ideen entwickelt und visualisiert. Dazu gehören: Scribbles (grobe Handskizzen), Moodboards (Inspirationssammlungen), erste Layouts und Gestaltungskonzepte. Ziel: verschiedene kreative Ansätze entwickeln die beim Kunden präsentiert werden.","keywords":["scribble","moodboard","layout","ideen","skizze","kreativ"]},{"type":"radio","q":"Was ist der Unterschied zwischen Angebot und Auftrag?","options":["Ein Angebot ist verbindlicher als ein Auftrag","Angebot: Leistungsumfang und Preise werden genannt. Auftrag: Kunde nimmt Angebot an – Vertrag kommt zustande.","Ein Auftrag kommt immer vor dem Angebot","Beide Begriffe bedeuten dasselbe"],"correct":[1],"explanation":"Angebot: Leistungsumfang, Preise, Gültigkeitsdauer – kann verbindlich oder unverbindlich sein. Auftrag: Kunde akzeptiert das Angebot = Vertrag kommt zustande."},{"type":"checkbox","q":"Welche Schritte gehören zum korrekten Workflow in der richtigen Logik?","options":["Briefing kommt vor dem Re-Briefing","Reinzeichnung kommt vor dem Entwurf","Abnahme kommt nach der Reinzeichnung","Abrechnung ist der letzte Schritt","Produktion kommt vor der Abnahme"],"correct":[0,2,3],"explanation":"Korrekt: Briefing → Re-Briefing → Konzept/Entwurf → Präsentation → Reinzeichnung → Abnahme → Produktion → Abrechnung."},{"type":"checkbox","q":"Was enthält ein vollständiges Briefing?","options":["Aufgabenstellung und Ziele","Fertige Reinzeichnung","Zielgruppe","Budget und Termine","Abgeschlossene Rechnung","Wettbewerbsumfeld"],"correct":[0,2,3,5],"explanation":"Briefing-Inhalte: Aufgabe, Ziele, Zielgruppe, Budget, Termine, Wettbewerb. Reinzeichnung und Rechnung kommen viel später im Prozess."},{"type":"radio","q":"Was ist eine Inhouse-Mediengestaltung?","options":["Eine externe Agentur die nur für einen Kunden arbeitet","Eine interne Mediengestaltungseinheit direkt im Unternehmen (z.B. Marketingabt.)","Ein Freelancer der von zuhause arbeitet","Eine Druckerei die im Unternehmen integriert ist"],"correct":[1],"explanation":"Inhouse: Interne Mediengestaltungsabteilung im Unternehmen selbst (z.B. Marketingabteilung eines Konzerns). Vorteile: kurze Wege, tiefes Markenwissen, keine Agenturhonorare."},{"type":"text","q":"Was passiert wenn ein Kunde das Angebot annimmt? Was entsteht dadurch?","modelAnswer":"Wenn der Kunde das Angebot annimmt, kommt ein Vertrag zustande – der Auftrag. Beide Seiten sind nun rechtlich gebunden: die Agentur muss die vereinbarte Leistung erbringen, der Kunde muss den vereinbarten Preis bezahlen. Deshalb ist das Re-Briefing wichtig – um sicherzustellen dass beide Seiten dasselbe verstehen.","keywords":["vertrag","annimmt","auftrag","rechtlich","gebunden","leistung"]},{"type":"radio","q":"Welche Betriebsform ist auf Akzidenzdruck (Flyer, Broschüren, Visitenkarten) spezialisiert?","options":["Werbeagentur","Digitalagentur","Druckerei","Verlag"],"correct":[2],"explanation":"Druckerei: Spezialisiert auf Akzidenzdruck (Flyer, Broschüren, Visitenkarten), Zeitungsdruck und Verpackungsdruck."},{"type":"checkbox","q":"Welche Abteilungen gibt es typischerweise in einer Werbeagentur?","options":["Beratung","Kreation","Produktion","Forschung & Entwicklung","Montage","Logistik"],"correct":[0,1,2],"explanation":"Typische Agentur-Abteilungen: Beratung (Kundenkontakt), Kreation (Design, Konzept), Produktion (Umsetzung). F&E, Montage und Logistik gehören eher zu Industrie/Fertigung."},{"type":"order","q":"Bringe den Produktionsworkflow in die richtige Reihenfolge:","steps":["1. Briefing – Aufgabe, Ziele, Budget, Termine","2. Re-Briefing – Auftrag zurückspiegeln","3. Konzept/Entwurf – Scribbles, Moodboard","4. Präsentation – Entwürfe vorstellen","5. Reinzeichnung – druckfertige Umsetzung","6. Abnahme – schriftliche Freigabe","7. Produktion – Daten übergeben","8. Abrechnung – Rechnung stellen"],"explanation":"Korrekter Workflow: Briefing → Re-Briefing → Konzept/Entwurf → Präsentation → Reinzeichnung → Abnahme → Produktion → Abrechnung. Die Abnahme ist besonders wichtig als Rechtsgrundlage!"},{"type":"text","q":"Erkläre was eine Werbeagentur ist, was sie macht und wie sie aufgebaut ist.","modelAnswer":"Eine Werbeagentur arbeitet für externe Kunden (B2B) und entwickelt Kommunikationskonzepte, Werbemittel und Kampagnen. Sie ist typischerweise in drei Abteilungen aufgebaut: Beratung (Kundenkontakt, Briefing aufnehmen, Projekte koordinieren), Kreation (Design, Konzept, Texte entwickeln) und Produktion (Druckdaten aufbereiten, Webentwicklung umsetzen). Sie arbeitet für verschiedene Branchen und Medienkanäle.","keywords":["extern","werbemittel","kampagne","beratung","kreation","produktion","b2b"]},{"type":"text","q":"Was ist der Unterschied zwischen einer Werbeagentur und einer Digitalagentur?","modelAnswer":"Werbeagentur: Fokus auf klassische und digitale Werbemittel (Print, TV, Film, Kampagnen). Traditionellere Strukturen. Digitalagentur: Fokus auf digitale Medien – Web, Apps, Social Media, UX/UI-Design. Nutzt agile Methoden wie Scrum (iterative Sprints) und Kanban (Aufgaben-Board). Schnellere, flexiblere Arbeitsweise.","keywords":["werbeagentur","digitalagentur","agil","scrum","kanban","web","apps","print"]},{"type":"text","q":"Was ist das Re-Briefing und warum ist es so wichtig?","modelAnswer":"Das Re-Briefing ist der Schritt, bei dem die Agentur das Briefing mit eigenen Worten zurückspiegelt – also dem Kunden erklärt, was sie verstanden hat. Es ist wichtig weil Missverständnisse aufgedeckt werden bevor Arbeit und Geld investiert werden. Beispiel: \"Ich habe verstanden, dass Sie einen DIN-Lang-Flyer für die Zielgruppe X möchten – stimmt das so?\" Ohne Re-Briefing riskiert man aufwändige Korrekturen.","keywords":["zurückspiegeln","missverständnis","bevor","verstanden","eigenen worten","korrekturen"]}]},{"id":2,"title":"3 · Projekte organisieren & Kunden beraten","shortTitle":"Organisation & Beratung","questions":[{"type":"radio","q":"Was ist der Zweck eines De-Briefings?","options":["Die erste Aufgabenübergabe an die Agentur","Abschlussbesprechung: Lessons Learned festhalten und Prozesse für die Zukunft verbessern","Zwischenbesprechung zur Fortschrittskontrolle","Prüfung des Markenauftritts auf Konsistenz"],"correct":[1],"explanation":"De-Briefing: Abschlussbesprechung nach Projektende. \"Lessons Learned\" werden dokumentiert – was lief gut, was schlecht – damit der nächste Auftrag besser läuft."},{"type":"radio","q":"Was ist ein Kick-off-Meeting?","options":["Die Abschlussfeier nach Projektende","Startbesprechung: Rollen, Zeitplan und Ziele mit allen Beteiligten definieren","Regelmäßige Prüfung des Markenauftritts","Erster Informationsaustausch mit dem Kunden über Budget"],"correct":[1],"explanation":"Kick-off: Startbesprechung zu Projektbeginn mit ALLEN Beteiligten. Definiert Rollen, Zeitplan, Ziele, Verantwortlichkeiten – alle sind auf demselben Stand."},{"type":"checkbox","q":"Welche Verhaltensaspekte sind beim Kundengespräch wichtig?","options":["Blickkontakt halten","Arme verschränken für Konzentration","Offene Körperhaltung zeigen","Deutlich und in angemessenem Tempo sprechen","Gepflegtes Erscheinungsbild","Fragende Stimme am Satzende für Höflichkeit"],"correct":[0,2,3,4],"explanation":"Korrekt: Blickkontakt, offene Haltung, klare Aussprache, gepflegtes Auftreten. FALSCH: Verschränkte Arme wirken abweisend. Fragende Stimme am Ende wirkt unsicher."},{"type":"radio","q":"Welche Sitzordnung gilt im Beratungsgespräch als kooperativer?","options":["Direkt gegenüber sitzen (über den Tisch)","Über Eck sitzen (90°-Anordnung)","Beide auf derselben Seite des Tisches","Runder Tisch ohne feste Plätze"],"correct":[1],"explanation":"Über Eck (90°): Kooperativer und offener als direkt gegenüber, weil keine physische Barriere zwischen den Gesprächspartnern. Wird als gleichwertiger empfunden."},{"type":"radio","q":"Das Urheberrecht entsteht...","options":["...erst nach Anmeldung beim Patentamt","...automatisch mit der Schöpfung des Werkes – keine Anmeldung nötig","...erst nach Veröffentlichung des Werkes","...nur bei kommerziell genutzten Werken"],"correct":[1],"explanation":"Das Urheberrecht entsteht AUTOMATISCH mit der Schöpfung – egal ob Foto, Design, Text oder Musik. Keine Anmeldung, kein Stempel nötig. Es gehört dem Schöpfer ab dem ersten Moment."},{"type":"radio","q":"Wie lange gilt das Urheberrecht in Deutschland?","options":["10 Jahre nach Veröffentlichung","50 Jahre nach Erstellung","70 Jahre nach dem Tod des Urhebers","Unbegrenzt"],"correct":[2],"explanation":"Urheberrecht gilt 70 Jahre nach dem Tod des Urhebers. Danach ist das Werk \"gemeinfrei\" – jeder darf es nutzen. Deshalb z.B. Beethoven-Musik frei nutzbar, aktuelle Musik nicht."},{"type":"radio","q":"Was ist der Hauptunterschied zwischen Urheberrecht und Nutzungsrecht?","options":["Das Urheberrecht ist käuflich, das Nutzungsrecht nicht","Das Urheberrecht verbleibt IMMER beim Schöpfer; das Nutzungsrecht ist eine Erlaubnis zur Nutzung die vergeben werden kann","Nutzungsrecht gilt nur für digitale Werke","Es gibt keinen relevanten Unterschied"],"correct":[1],"explanation":"Urheberrecht: Persönliches Recht des Schöpfers – nicht übertragbar, immer beim Urheber. Nutzungsrecht: Erlaubnis/Lizenz zur Nutzung – kann vergeben werden ohne das Urheberrecht abzugeben."},{"type":"radio","q":"Was ist der Unterschied zwischen einfachem und ausschließlichem Nutzungsrecht?","options":["Kein Unterschied, beide bedeuten dasselbe","Einfach = mehrere Nutzer dürfen das Werk nutzen; Ausschließlich = nur EINER darf nutzen (sogar der Urheber nicht mehr)","Ausschließlich ist immer günstiger","Einfach gilt nur für Print, ausschließlich für Digital"],"correct":[1],"explanation":"Einfaches NR: Mehrere Lizenznehmer können das Werk nutzen (z.B. Stockfotos). Ausschließliches NR: Nur EINER darf es nutzen – selbst der Urheber braucht dann Erlaubnis! Teurer, aber exklusiv."},{"type":"text","q":"Erkläre was Creative Commons ist und was die Kürzel BY, NC, SA und ND bedeuten.","modelAnswer":"Creative Commons sind fertige Standard-Lizenzen die es Urhebern erlauben ihre Werke gezielt zu teilen ohne eigene Verträge schreiben zu müssen. BY = Namensnennung des Urhebers Pflicht. NC = Non Commercial, nur nicht kommerziell nutzen. SA = Share Alike, Bearbeitungen unter gleicher Lizenz weitergeben. ND = No Derivatives, keine Bearbeitung erlaubt.","keywords":["by","nc","sa","nd","namensnennung","kommerziell","lizenz","bearbeitung"]},{"type":"radio","q":"Du willst ein CC BY-NC Bild für ein Kundenprojekt nutzen. Ist das erlaubt?","options":["Ja, CC bedeutet immer kostenlos für alle","Ja, solange du den Urheber nennst","NEIN – NC bedeutet nicht kommerziell. Kundenprojekte sind kommerziell!","Ja, wenn du das Bild nicht veränderst"],"correct":[2],"explanation":"NC = Non Commercial. Kundenprojekte gelten als kommerzielle Nutzung weil du damit Geld verdienst. Für kommerzielle Projekte sind NC-Lizenzen verboten. Nur CC BY oder CC BY-SA nutzen, oder bezahlte Stocklizenzen!"},{"type":"checkbox","q":"Welche CC-Lizenzen sind für kommerzielle Kundenprojekte erlaubt?","options":["CC BY (nur Namensnennung)","CC BY-NC (nicht kommerziell)","CC BY-SA (Namensnennung + gleiche Lizenz)","CC BY-NC-SA (nicht kommerziell)","CC BY-ND (keine Bearbeitung)","CC0 (Public Domain)"],"correct":[0,2,4,5],"explanation":"Für kommerzielle Nutzung erlaubt: CC BY, CC BY-SA, CC BY-ND, CC0 (kein NC dabei). VERBOTEN für kommerzielle Nutzung: alles mit NC (Non Commercial)."},{"type":"radio","q":"Was bedeutet CC0 (Creative Commons Zero)?","options":["Das Werk hat 0 Lizenzen und darf gar nicht genutzt werden","Der Urheber verzichtet auf alle Rechte – das Werk ist Public Domain, keine Namensnennung nötig","Das Werk darf nur 0 Mal kopiert werden","Eine sehr eingeschränkte Lizenz"],"correct":[1],"explanation":"CC0: Vollständiger Rechteverzicht. Das Werk ist praktisch gemeinfrei. Kein Urheber nennen nötig, alles erlaubt. Beispiele: Unsplash, Pexels (die meisten Bilder dort sind CC0)."},{"type":"text","q":"Was schützt die DSGVO und welche Grundsätze kennst du?","modelAnswer":"Die DSGVO schützt personenbezogene Daten – alles womit man eine Person identifizieren kann: Name, Adresse, E-Mail, Telefon, Foto einer Person, IP-Adresse. Grundsätze: Datensparsamkeit (nur nötige Daten erheben), Zweckbindung (nur für den Zweck nutzen für den erhoben), Transparenz (Nutzer muss wissen was gespeichert wird), Rechtmäßigkeit. Bußgelder bis 20 Mio. € oder 4% des weltweiten Jahresumsatzes.","keywords":["personenbezogen","datensparsamkeit","zweckbindung","transparenz","bußgeld","20 mio","4%"]},{"type":"radio","q":"Als Angestellter erstellst du ein Logo für deinen Arbeitgeber. Wer ist der Urheber?","options":["Der Arbeitgeber, weil er bezahlt hat","Du als Schöpfer bist der Urheber, aber die wirtschaftlichen Nutzungsrechte gehen laut §43 UrhG automatisch an den Arbeitgeber über","Niemand, weil es im Auftrag entstanden ist","Der Kunde für den das Logo erstellt wurde"],"correct":[1],"explanation":"Du bleibst immer der Urheber (Schöpfer). Aber als Angestellter: laut §43 UrhG gehen wirtschaftliche Nutzungsrechte automatisch an den Arbeitgeber über. Anders als beim Freelancer ohne Vertrag!"},{"type":"order","q":"Ordne die Besprechungsarten in die richtige zeitliche Reihenfolge eines Projekts:","steps":["Briefing – erster Informationsaustausch mit dem Kunden","Re-Briefing – Auftrag zurückspiegeln","Kick-off – Startbesprechung mit allen Beteiligten","Status Meeting – Zwischenbesprechung zum Fortschritt","Brand Review Meeting – Prüfung des Markenauftritts","De-Briefing – Abschlussbesprechung, Lessons Learned"],"explanation":"Logische Reihenfolge: Briefing (Aufgabe erhalten) → Re-Briefing (Verständnis prüfen) → Kick-off (Projekt starten) → Status Meetings (Fortschritt kontrollieren) → Brand Review (Markenprüfung) → De-Briefing (Abschluss)."},{"type":"text","q":"Was ist ein De-Briefing und warum macht man es nach einem Projekt?","modelAnswer":"Ein De-Briefing ist die Abschlussbesprechung nach Projektende. Darin werden \"Lessons Learned\" festgehalten: Was lief gut? Was schlecht? Wo gab es Probleme? Ziel ist es, Prozesse für das nächste Projekt zu verbessern. Es hilft dem Team, aus Fehlern zu lernen und erfolgreiche Strategien zu wiederholen.","keywords":["abschluss","lessons learned","verbesserung","fehler","prozesse","nächstes projekt"]},{"type":"text","q":"Erkläre den Unterschied zwischen einfachem und ausschließlichem Nutzungsrecht an einem konkreten Beispiel.","modelAnswer":"Einfaches Nutzungsrecht: Mehrere Personen/Firmen erhalten dieselbe Erlaubnis. Beispiel: Stockfoto auf Getty Images – tausende Unternehmen kaufen dieselbe Lizenz und dürfen das Foto alle gleichzeitig verwenden. Ausschließliches Nutzungsrecht: Nur eine einzige Person/Firma darf das Werk nutzen. Beispiel: Ein Unternehmen kauft die exklusiven Rechte an einem Foto für 5 Jahre für Deutschland – kein anderer darf es nutzen, selbst der Fotograf nicht ohne Erlaubnis.","keywords":["einfach","ausschließlich","stockfoto","exklusiv","mehrere","einer","erlaubnis"]},{"type":"text","q":"Was sind Creative Commons und was bedeutet CC BY-NC-SA?","modelAnswer":"Creative Commons sind fertige Standard-Lizenzen die es erlauben Werke gezielt zu teilen ohne eigene Verträge schreiben zu müssen. CC BY-NC-SA bedeutet: BY = Urheber muss genannt werden, NC = nur nicht-kommerziell nutzen (kein Geld damit verdienen), SA = Bearbeitungen müssen unter derselben Lizenz weitergegeben werden. Wichtig: NC-Lizenzen dürfen NICHT für kommerzielle Kundenprojekte verwendet werden!","keywords":["by","nc","sa","namensnennung","nicht kommerziell","gleiche lizenz","cc","kunden"]}]},{"id":3,"title":"4 · Kommunikationskonzepte & KI-Tools","shortTitle":"Konzepte & KI","questions":[{"type":"radio","q":"Was ist eine Persona im Kommunikationskonzept?","options":["Ein realer Kunde der befragt wird","Eine fiktive Musterperson die einen typischen Nutzer der Zielgruppe repräsentiert","Der Projektverantwortliche auf Kundenseite","Eine Marktforschungsstudie"],"correct":[1],"explanation":"Persona: Fiktive, aber realistische Musterperson. Enthält: Name, Foto, Alter, Beruf, Ziele, Frustrationen, Mediennutzung. Hilft Gestaltungsentscheidungen auf echte Nutzer auszurichten."},{"type":"radio","q":"Was ist die wichtigste Grundregel beim Brainstorming?","options":["Nur die besten Ideen aufschreiben","Ideen sofort bewerten und filtern","Alle Ideen frei und unbewertet sammeln – keine Kritik während des Sammelns!","Maximal 5 Ideen pro Person"],"correct":[2],"explanation":"Brainstorming: Alle Ideen sammeln OHNE Bewertung oder Kritik. Quantität vor Qualität! Erst danach werden Ideen geclustert und bewertet."},{"type":"radio","q":"Was beschreibt die 635-Methode (Brainwriting)?","options":["6 Schritte, 3 Ziele, 5 Personen","6 Personen schreiben je 3 Ideen auf – das Blatt wird 5 Runden weitergegeben und ausgebaut","6 Bilder, 3 Farben, 5 Schriften für ein Moodboard","Eine Zeitplanmethode"],"correct":[1],"explanation":"635-Methode: 6 Personen × 3 Ideen × 5 Runden. Jedes Blatt wird weitergegeben, Ideen der anderen werden aufgegriffen und weiterentwickelt. Vorteil: auch Introvertierte beteiligen sich gleichmäßig."},{"type":"radio","q":"Was ist ein Moodboard?","options":["Ein Stimmungsprotokoll aus Kundenmeetings","Eine visuelle Inspirationssammlung aus Bildern, Farben, Typografie und Materialien","Eine grobe Handskizze zur Ideenvisualisierung","Ein digitales Wireframe des geplanten Layouts"],"correct":[1],"explanation":"Moodboard: Visuelle Inspirationssammlung. Dient als gemeinsame Basis zwischen Designer und Kunde – zeigt Stimmung und Richtung bevor der erste Entwurf entsteht."},{"type":"checkbox","q":"Welche drei Dimensionen hat die Zielgruppenanalyse?","options":["Demografisch (Alter, Geschlecht, Einkommen)","Technisch (Geräte, Browser)","Psychografisch (Werte, Interessen, Lebensstil)","Behavioristisch (Kaufverhalten, Mediennutzung)","Monetär (Vermögen)","Geografisch (Region)"],"correct":[0,2,3],"explanation":"Zielgruppenanalyse laut Lernzettel: Demografisch (Alter, Geschlecht, Einkommen), Psychografisch (Werte, Interessen), Behavioristisch (Kaufverhalten)."},{"type":"checkbox","q":"Was muss beim Einsatz von KI-Tools im Medienbetrieb beachtet werden?","options":["Keine vertraulichen Kundendaten eingeben (DSGVO!)","KI-Output immer 1:1 übernehmen – spart Zeit","KI kann Halluzinationen produzieren → immer Faktencheck machen","Urheberrecht prüfen – KI-Output kann auf geschütztem Material basieren","KI-Tools sind immer zu 100% zuverlässig","KI-generierten Inhalt ggf. kennzeichnen"],"correct":[0,2,3,5],"explanation":"KI-Tools: Kein DSGVO-Verstoß durch Kundendaten, Faktencheck bei Halluzinationen, Urheberrecht prüfen, Output überarbeiten und ggf. kennzeichnen. NIE 1:1 übernehmen!"},{"type":"radio","q":"Was bedeutet \"Halluzination\" bei KI-Tools?","options":["Die KI produziert besonders kreative Bilder","Die KI gibt falsche Informationen plausibel klingend aus ohne es zu merken","Ein visueller Fehler im KI-Output","Die KI versteht den Prompt nicht"],"correct":[1],"explanation":"KI-Halluzinationen: Die KI erfindet Fakten, Quellen oder Informationen die nicht existieren – und präsentiert sie überzeugend. Immer kritisch prüfen, nie blind vertrauen!"},{"type":"radio","q":"Warum ist die Promptqualität bei KI-Tools entscheidend?","options":["Längere Prompts führen immer zu besseren Ergebnissen","Je genauer Kontext, Tonalität und Format vorgegeben werden, desto besser das Ergebnis","KI-Tools ignorieren Prompts und antworten zufällig","Der Prompt hat keinen Einfluss"],"correct":[1],"explanation":"Promptqualität: Je genauer der Prompt (Kontext, Zielgruppe, Tonalität, Format, Beispiele), desto präziser und nützlicher die KI-Ausgabe. \"Garbage in – garbage out.\""},{"type":"text","q":"Was ist eine Mindmap und wie ist sie aufgebaut?","modelAnswer":"Eine Mindmap ist ein visuelles Werkzeug zur strukturierten Ideensammlung und Wissensdarstellung. Aufbau: Das Hauptthema steht in der Mitte. Von dort gehen Äste für Oberthemen ab. Von den Ästen gehen Zweige für Details und Unterthemen ab. Mindmaps helfen Zusammenhänge zu erkennen und Themen übersichtlich zu strukturieren.","keywords":["hauptthema","mitte","äste","zweige","oberthemen","struktur","visuell"]},{"type":"radio","q":"Warum darf man bei KI-Tools keine Kundendaten eingeben?","options":["Weil die KI dann schlechtere Ergebnisse liefert","Wegen DSGVO: Kundendaten sind personenbezogen und dürfen nicht an externe Dienste übermittelt werden","Weil KI-Tools keine Texte verarbeiten können","Das ist nur bei kostenlosen Tools verboten"],"correct":[1],"explanation":"DSGVO: Kundendaten (Namen, Kontakte, Projekte) sind personenbezogen. Eingabe in externe KI-Dienste verstößt gegen Datenschutz – die Daten könnten für Training verwendet werden."},{"type":"text","q":"Was ist ein Scribble und wann wird es im Designprozess eingesetzt?","modelAnswer":"Ein Scribble ist eine grobe, schnelle Handskizze zur Visualisierung einer Idee. Es muss nicht perfekt sein – Ziel ist es schnell eine Idee zu zeigen ohne viel Zeit zu investieren. Scribbles werden in der frühen Konzeptphase eingesetzt, um verschiedene Layoutideen schnell durchzuspielen und dem Kunden zu zeigen, bevor detaillierte Entwürfe erstellt werden.","keywords":["grob","skizze","schnell","idee","konzept","früh","hand"]},{"type":"radio","q":"Was ist der Hauptvorteil der 635-Methode gegenüber normalem Brainstorming?","options":["Es gibt keine Vorteile, Brainstorming ist immer besser","Auch introvertierte Personen beteiligen sich gleichmäßig, da schriftlich und ohne direkten Druck","Es entstehen weniger Ideen","Es braucht weniger Personen"],"correct":[1],"explanation":"635-Vorteil: Schriftlich und ohne direkte Kritik – auch introvertierte Personen beteiligen sich gleichmäßig. Außerdem: Ideen anderer werden aufgegriffen und weiterentwickelt."},{"type":"checkbox","q":"Was enthält eine vollständige Persona?","options":["Name und fiktives Foto (Stockbild)","Echte persönliche Daten eines Kunden","Alter und Beruf","Ziele und Frustrationen (Pain Points)","Bevorzugte Mediennutzung","Genaue Privatadresse"],"correct":[0,2,3,4],"explanation":"Persona-Inhalte: Name, Foto (Stockbild – kein echtes!), Alter, Beruf, Ziele, Frustrationen, Mediennutzung, typisches Zitat. Keine echten persönlichen Daten!"},{"type":"order","q":"Bringe den Kreativprozess von der Analyse bis zum fertigen Entwurf in die richtige Reihenfolge:","steps":["Zielgruppenanalyse – Wer sind die Nutzer?","Persona erstellen – Konkrete Musterperson definieren","Brainstorming / 635-Methode – Ideen sammeln","Moodboard – Visuelle Richtung festlegen","Scribble – Grobe Ideen skizzieren","Entwurf – Erste ausgearbeitete Version"],"explanation":"Kreativprozess: Erst verstehen (Zielgruppe → Persona), dann ideieren (Brainstorming), dann visualisieren (Moodboard → Scribble → Entwurf)."},{"type":"text","q":"Was ist eine Persona und was unterscheidet sie von einer Zielgruppenanalyse?","modelAnswer":"Zielgruppenanalyse: Abstrakte Beschreibung einer Gruppe nach demografischen (Alter, Geschlecht), psychografischen (Werte, Interessen) und behavioristischen (Kaufverhalten) Merkmalen. Persona: Verdichtet die Zielgruppe zu einer konkreten fiktiven Musterperson mit Name, Foto (Stockbild), Alter, Beruf, Zielen und Frustrationen. Die Persona macht die abstrakte Zielgruppe greifbar und hilft bei Designentscheidungen.","keywords":["abstrakt","konkret","fiktiv","musterperson","demografisch","ziele","frustrationen","greifbar"]},{"type":"text","q":"Erkläre was KI-Halluzinationen sind und was du als Mediengestalter dagegen tun kannst.","modelAnswer":"KI-Halluzinationen: KI-Tools wie ChatGPT erfinden manchmal Fakten, Quellen oder Informationen die nicht existieren – und präsentieren sie überzeugend und plausibel klingend. Beispiele: Erfundene Statistiken, nicht existierende Gerichtsurteile, falsche Firmendaten. Maßnahmen: Immer Faktencheck machen, Output nie 1:1 übernehmen, kritisch hinterfragen, bei wichtigen Informationen Originalquellen prüfen.","keywords":["halluzination","erfinden","fakten","falsch","faktencheck","prüfen","originalquellen"]}]},{"id":4,"title":"5 · Gestalterische Grundlagen","shortTitle":"Gestaltgesetze","questions":[{"type":"radio","q":"Das Gestaltgesetz der Nähe besagt:","options":["Gleiche Farben werden als zusammengehörig wahrgenommen","Elemente die räumlich nah beieinander stehen werden als Gruppe wahrgenommen","Das Auge folgt Linien bis zu ihrem Ende","Unvollständige Formen werden als vollständig ergänzt"],"correct":[1],"explanation":"Nähe: Nahe Elemente = zusammengehörig. Im Design: Abstände gezielt einsetzen um Gruppen zu bilden oder zu trennen."},{"type":"radio","q":"Das Gestaltgesetz der Geschlossenheit besagt:","options":["Das Gehirn bevorzugt die einfachste Interpretation","Unvollständige Formen werden vom Gehirn zu vollständigen ergänzt","Gleiche Farben werden als zusammengehörig wahrgenommen","Symmetrische Elemente wirken stabiler"],"correct":[1],"explanation":"Geschlossenheit: Das Gehirn ergänzt fehlende Teile zu bekannten Formen. Beispiele: FedEx-Pfeil im negativen Raum, WWF-Panda-Logo."},{"type":"radio","q":"Was beschreibt das Figur-Grund-Prinzip?","options":["Figuren stehen immer vor weißem Hintergrund","Das Gehirn trennt automatisch Vordergrund (Figur) von Hintergrund (Grund) – kann mehrdeutig sein","Größere Elemente werden immer als Figur wahrgenommen","Der Hintergrund ist immer weniger wichtig"],"correct":[1],"explanation":"Figur/Grund: Gehirn trennt automatisch Vorder- und Hintergrund. Kann mehrdeutig sein (Kippbilder wie Vase/Gesicht). Grundlage für Kontrast und Lesbarkeit im Design."},{"type":"radio","q":"Das Gestaltgesetz der Prägnanz besagt:","options":["Symmetrische Formen sind immer besser","Das Gehirn bevorzugt die einfachste und regelmäßigste Interpretation einer visuellen Information","Bunte Elemente werden zuerst wahrgenommen","Größere Elemente sind prägnanter als kleine"],"correct":[1],"explanation":"Prägnanz (gute Gestalt): Das Gehirn nimmt die einfachste und regelmäßigste Interpretation wahr. \"Keep it simple\" hat hier seine wissenschaftliche Grundlage."},{"type":"radio","q":"Das Gestaltgesetz des \"Gemeinsamen Schicksals\" besagt:","options":["Elemente die gemeinsam eine Fläche bilden gehören zusammen","Elemente die sich in dieselbe Richtung bewegen werden als Gruppe wahrgenommen","Gleichartige Elemente bilden immer eine Gruppe","Verbundene Elemente werden als Einheit gesehen"],"correct":[1],"explanation":"Gemeinsames Schicksal: Gleiche Bewegungsrichtung = Gruppe. Relevant für Animationen, Scrolleffekte und bewegte Elemente im digitalen Design."},{"type":"radio","q":"Das Gestaltgesetz der Kontinuität besagt:","options":["Gleiche Bewegungsrichtung = Gruppe","Das Auge folgt Linien und Kurven über Unterbrechungen hinweg – Blicklenkung durch Achsen","Durch Linien verbundene Elemente wirken zusammengehörig","Bekannte Muster werden schneller erkannt"],"correct":[1],"explanation":"Kontinuität: Das Auge folgt Linien über Unterbrechungen hinweg. Im Design: Blicklenkung durch Achsen, Führungslinien und Richtungsverläufe."},{"type":"text","q":"Erkläre das Gestaltgesetz der Ähnlichkeit mit einem praktischen Designbeispiel.","modelAnswer":"Ähnlichkeit: Elemente mit gleicher Farbe, Form, Größe oder Textur werden als zusammengehörig wahrgenommen. Praktisches Beispiel: Alle Buttons einer Webseite haben dieselbe blaue Farbe → werden sofort als \"klickbare Elemente\" erkannt. Alle Überschriften in derselben Schrift und Größe → wirken als Einheit. Einheitliche Ikonenstile in einem Set.","keywords":["ähnlichkeit","gleiche","farbe","form","zusammengehörig","button","schrift"]},{"type":"radio","q":"Das Gestaltgesetz der Verbundenheit besagt:","options":["Ähnliche Elemente wirken zusammengehörig","Durch Linien oder Flächen physisch verbundene Elemente werden als zusammengehörig wahrgenommen","Elemente die sich bewegen gehören zusammen","Bekannte Icons werden sofort erkannt"],"correct":[1],"explanation":"Verbundenheit: Physisch verbundene Elemente (durch Linien, Rahmen, Flächen) werden stärker als zusammengehörig wahrgenommen als bloße Nähe oder Ähnlichkeit allein."},{"type":"radio","q":"Das Gestaltgesetz der Erfahrung besagt:","options":["Je mehr Erfahrung ein Designer hat, desto besser das Ergebnis","Bekannte Muster und Icons werden schneller erkannt und brauchen keine Erklärung","Erfahrene Nutzer können schlechte Designs besser verstehen","Designs basieren immer auf historischen Vorbildern"],"correct":[1],"explanation":"Erfahrung: Bekannte Muster werden sofort erkannt. Deshalb: Standard-Icons nutzen (Warenkorb, Lupe, Hamburger-Menü) – keine eigenen Symbole erfinden die Nutzer verwirren."},{"type":"checkbox","q":"Welche der folgenden sind echte Gestaltgesetze?","options":["Gesetz der Nähe","Gesetz der Auflösung","Gesetz der Ähnlichkeit","Gesetz der Kontinuität","Gesetz des Kernings","Gesetz der Geschlossenheit"],"correct":[0,2,3,5],"explanation":"Echte Gestaltgesetze: Nähe, Ähnlichkeit, Kontinuität, Geschlossenheit, Figur/Grund, Prägnanz, Symmetrie, Gemeinsames Schicksal, Verbundenheit, Erfahrung. Auflösung und Kerning sind keine Gestaltgesetze."},{"type":"text","q":"Erkläre anhand eines Beispiels wie du das Gestaltgesetz der Nähe bewusst im Layout einsetzt.","modelAnswer":"Beispiel Formular: Label und Eingabefeld eng zusammenstellen (geringe Nähe = gehören zusammen). Größeren Abstand zwischen verschiedenen Formularfeldern. So erkennt der Nutzer sofort welches Label zu welchem Feld gehört. Oder Produktkarte: Produktbild, Titel, Preis und Kaufen-Button dicht zusammen → wirken als Einheit. Ausreichend Weißraum zur nächsten Produktkarte.","keywords":["abstand","zusammen","gruppe","label","layout","nähe","weißraum"]},{"type":"radio","q":"Gestaltgesetze stammen aus der...","options":["...Adobe-Designphilosophie der 1990er Jahre","...Gestaltpsychologie (früh 20. Jahrhundert)","...Bauhaus-Schule und gelten nur für Printdesign","...modernen UX-Forschung der 2000er Jahre"],"correct":[1],"explanation":"Gestaltgesetze stammen aus der Gestaltpsychologie (Wertheimer, Koffka, Köhler, frühes 20. Jh.) und beschreiben wie das menschliche Gehirn visuelle Informationen ordnet. Gelten für Print UND Digital."},{"type":"radio","q":"Das Gestaltgesetz der Symmetrie besagt:","options":["Symmetrische Layouts sind immer besser als asymmetrische","Symmetrische Elemente wirken als zusammengehörig und stabil","Nur achsensymmetrische Logos sind professionell","Beide Seiten müssen identisch sein"],"correct":[1],"explanation":"Symmetrie: Symmetrische Elemente werden als zusammengehörig und stabil wahrgenommen. Im Design für Gleichgewicht und Ruhe eingesetzt – Asymmetrie erzeugt dagegen Spannung und Dynamik."},{"type":"order","q":"Ordne die Gestaltgesetze nach ihrer Grundidee: zuerst die über Gruppierung, dann über Wahrnehmung, dann über Erfahrung:","steps":["Nähe – nahe Elemente gehören zusammen","Ähnlichkeit – gleiche Elemente gehören zusammen","Verbundenheit – verbundene Elemente gehören zusammen","Figur/Grund – Gehirn trennt Vorder- von Hintergrund","Prägnanz – Gehirn bevorzugt einfachste Interpretation","Erfahrung – bekannte Muster werden sofort erkannt"],"explanation":"Gruppierungsgesetze: Nähe, Ähnlichkeit, Verbundenheit, Gemeinsames Schicksal. Wahrnehmungsgesetze: Figur/Grund, Kontinuität, Geschlossenheit, Symmetrie, Prägnanz. Erfahrungsgesetz: Bekannte Muster/Icons brauchen keine Erklärung."},{"type":"text","q":"Erkläre das Gestaltgesetz der Geschlossenheit und nenne ein bekanntes Design-Beispiel.","modelAnswer":"Das Gesetz der Geschlossenheit besagt, dass das Gehirn unvollständige Formen automatisch zu vollständigen ergänzt. Es \"sieht\" eine bekannte Form auch wenn sie nicht vollständig gezeigt wird. Bekannte Beispiele: FedEx-Logo (Pfeil im negativen Raum zwischen E und x), WWF-Panda-Logo (aus Flecken erkennbar), Kreise aus Bögen, Pfeile aus Dreiecken.","keywords":["unvollständig","ergänzt","gehirn","negativer raum","fedex","panda","bekannt"]},{"type":"text","q":"Was ist der Unterschied zwischen Figur-Grund-Trennung und dem Gesetz der Kontinuität?","modelAnswer":"Figur/Grund: Das Gehirn trennt automatisch Vordergrund (Figur = das gesehene Objekt) von Hintergrund (Grund). Kann mehrdeutig sein – Kippbilder wie die Vase/Gesichter-Illusion nutzen das. Kontinuität: Das Auge folgt Linien, Kurven und Verläufen über Unterbrechungen hinweg. Im Design für Blicklenkung durch Achsen und Führungslinien genutzt.","keywords":["figur","grund","vordergrund","hintergrund","kippbild","kontinuität","linie","blicklenkung"]}]},{"id":5,"title":"6 · Typografische Grundlagen","shortTitle":"Typografie","questions":[{"type":"radio","q":"Was ist das Merkmal einer Antiqua / Serifenschrift?","options":["Keine Serifen, modern und klar","Dicke eckige Serifen wie bei Rockwell","Kleine Füßchen (Serifen) an den Buchstabenenden – klassisch, vertrauenswürdig","Imitiert Handschrift"],"correct":[2],"explanation":"Antiqua/Serif: Serifen = kleine Füßchen an den Buchstabenenden. Klassisch, vertrauenswürdig. Gut für Fließtext im Druck. Beispiele: Garamond, Times, Bodoni."},{"type":"radio","q":"Was ist der Unterschied zwischen Kerning und Tracking (Laufweite)?","options":["Kerning und Tracking bedeuten dasselbe","Kerning: individueller Abstand zwischen 2 Buchstabenpaaren. Tracking: gleichmäßiger Abstand ALLER Buchstaben eines Texts.","Kerning ist für Fließtext, Tracking für Überschriften","Tracking betrifft nur den Abstand zwischen Wörtern"],"correct":[1],"explanation":"Kerning (Mikro): Individueller Abstand zwischen 2 Buchstabenpaaren (z.B. AV, WA) – optische Korrektur. Tracking/Laufweite (Mikro): Gleichmäßiger Zeichenabstand ALLER Buchstaben eines Texts."},{"type":"radio","q":"Was ist der Durchschuss (Leading)?","options":["Der horizontale Abstand zwischen Buchstaben","Der Abstand von Grundlinie zu Grundlinie zweier Zeilen. Faustformel: 120% der Schriftgröße.","Die Strichstärke eines Buchstabens","Der Abstand zwischen zwei Absätzen"],"correct":[1],"explanation":"Durchschuss (Leading): Abstand von Grundlinie zu Grundlinie zweier Zeilen. Faustformel: 120% der Schriftgröße. Zu wenig = gedrängt, zu viel = zerrissen."},{"type":"radio","q":"Welche Satzart empfiehlt sich für Fließtext auf Bildschirmen / Mobile?","options":["Blocksatz – für gleichmäßige Ränder","Zentriert – für bessere Lesbarkeit","Flattersatz (linksbündig) – gleichmäßige Wortabstände, keine Löcher","Rechtsbündig – moderner Look"],"correct":[2],"explanation":"Flattersatz auf Screen: Links bündig, rechts ungleich. Gleichmäßige Wortabstände (keine Löcher wie beim Blocksatz). Empfohlen für Web und Mobile."},{"type":"radio","q":"Warum ist Blocksatz auf kleinen Screens problematisch?","options":["Blocksatz kann nicht digital gerendert werden","Kurze Zeilen führen zu extremen Wortabständen, Löchern und \"Flüssen\" im Text","Browser unterstützen Blocksatz nicht","Blocksatz funktioniert nur auf großen Monitoren"],"correct":[1],"explanation":"Blocksatz auf kleinen Screens: Wenige Wörter pro Zeile → extreme Wortabstände, sogenannte \"Flüsse\" (optische Schlangen im Text). Flattersatz ist hier besser."},{"type":"checkbox","q":"Was gehört zur Mikrotypografie?","options":["Kerning (individueller Buchstabenabstand)","Satzspiegel und Seitenraster","Ligaturen (fi, fl, ff)","Gedankenstrich (–) statt Bindestrich (-)","Spaltenaufteilung und Zeilenabstände","Kapitälchen für Auszeichnungen"],"correct":[0,2,3,5],"explanation":"Mikrotypografie: Details auf Buchstaben-/Wortebene: Kerning, Ligaturen, korrekte Sonderzeichen (–, »«), Kapitälchen. Satzspiegel und Spalten = Makrotypografie."},{"type":"radio","q":"Was sind Ligaturen?","options":["Verbindungslinien zwischen Wörtern","Zwei Buchstaben zu einem einzigen Zeichen verbunden (fi, fl, ff)","Kursive Buchstabenformen","Spezielle Satzzeichen wie & und @"],"correct":[1],"explanation":"Ligaturen (Mikro): Zwei Buchstaben werden zu einem Zeichen verbunden. Klassische Beispiele: fi, fl, ff, ffi. Verbessern optische Qualität von Textsatz."},{"type":"radio","q":"Was ist die optimale Zeilenlänge für beste Lesbarkeit?","options":["20–30 Zeichen","40–70 Zeichen (ca. 7–12 Wörter)","80–100 Zeichen","So breit wie möglich"],"correct":[1],"explanation":"Optimale Zeilenlänge: 40–70 Zeichen (ca. 7–12 Wörter). Zu kurz = zu viele Zeilenumbrüche. Zu lang = Auge verliert die Zeile beim Zurückspringen."},{"type":"radio","q":"Was ist der Satzspiegel?","options":["Ein Spiegel im Druckraum zur Qualitätskontrolle","Der bedruckte Bereich einer Seite – definiert durch Bundsteg, Außensteg, Kopfsteg und Fußsteg","Das Verhältnis von Schriftgröße zu Zeilenabstand","Die maximale Anzahl von Zeilen pro Seite"],"correct":[1],"explanation":"Satzspiegel (Makro): Der bedruckte Bereich einer Seite. Stege: Bund (innen) · Außen · Kopf · Fuß im Verhältnis 1:1,5:1:2."},{"type":"radio","q":"Welche Mindest-Schriftgröße gilt für Fließtext auf mobilen Bildschirmen?","options":["10 px","12 px","16 px","20 px"],"correct":[2],"explanation":"Mindestens 16 px Schriftgröße für Fließtext auf mobilen Geräten – kleinere Schriften erfordern Zoomen und beeinträchtigen die Lesbarkeit stark."},{"type":"text","q":"Erkläre den Unterschied zwischen Makro- und Mikrotypografie mit je einem Beispiel.","modelAnswer":"Mikrotypografie: Details auf Buchstaben- und Wortebene. Beispiele: Kerning (AV enger stellen), Ligaturen (fi zu einem Zeichen), korrekter Gedankenstrich statt Bindestrich. Makrotypografie: Das große Bild, Struktur und Raumaufteilung. Beispiele: Satzspiegel definieren, Spaltenraster anlegen, Durchschuss für den gesamten Text festlegen.","keywords":["mikro","makro","kerning","ligaturen","satzspiegel","raster","spalten","durchschuss"]},{"type":"radio","q":"Wie lautet die Faustformel für den Durchschuss?","options":["100% der Schriftgröße","120% der Schriftgröße","150% der Schriftgröße","200% der Schriftgröße"],"correct":[1],"explanation":"Durchschuss Faustformel: 120% der Schriftgröße. Bei 10pt Schrift also ca. 12pt Durchschuss. Zu wenig wirkt gedrängt, zu viel zerreißt den Textfluss."},{"type":"checkbox","q":"Welche Aussagen zur Schriftgröße sind korrekt?","options":["1 pt = 0,353 mm","Fließtext im Druck: mindestens 9–10 pt","Fließtext auf Screen: mindestens 16 px","Schriftgröße wird in cm gemessen","Display-Schriften eignen sich gut für Fließtext"],"correct":[0,1,2],"explanation":"1 pt = 0,353 mm. Druck-Fließtext: min. 9–10 pt. Screen-Fließtext: min. 16 px. Display-Schriften NUR für Überschriften/Plakate – nie für Fließtext!"},{"type":"order","q":"Ordne die typografischen Maßnahmen von der kleinsten Detailebene (Mikro) zur größten Strukturebene (Makro):","steps":["Kerning – Abstand zwischen 2 Buchstabenpaaren korrigieren","Tracking – Laufweite aller Buchstaben gleichmäßig anpassen","Durchschuss – Zeilenabstand festlegen (120% der Schriftgröße)","Satzspiegel – bedruckten Bereich der Seite definieren","Gestaltungsraster – Spalten- und Zeilensystem anlegen"],"explanation":"Von Mikro nach Makro: Kerning (2 Zeichen) → Tracking (alle Zeichen) → Durchschuss (Zeilen) → Satzspiegel (Seite) → Gestaltungsraster (Gesamtlayout)."},{"type":"text","q":"Erkläre was Mikrotypografie ist und nenne drei konkrete Beispiele.","modelAnswer":"Mikrotypografie beschäftigt sich mit typografischen Details auf Buchstaben- und Wortebene – also dem \"Feinschliff\" eines Textes. Drei Beispiele: 1. Kerning – individueller Abstand zwischen Buchstabenpaaren wie AV oder Te korrigieren. 2. Ligaturen – zwei Buchstaben zu einem Zeichen verbinden (fi, fl, ff). 3. Gedankenstrich (–) statt Bindestrich (-) verwenden. Weitere: korrekte Anführungszeichen »«, Kapitälchen für Abkürzungen.","keywords":["detail","buchstaben","kerning","ligaturen","gedankenstrich","feinschliff","wortebene"]},{"type":"text","q":"Was ist Makrotypografie? Erkläre Satzspiegel und Gestaltungsraster.","modelAnswer":"Makrotypografie beschäftigt sich mit der Struktur und Raumaufteilung auf Seiten- und Layoutebene. Satzspiegel: Der bedruckte Bereich einer Seite, definiert durch vier Randstege (Bund innen, Außen, Kopf oben, Fuß unten) im klassischen Verhältnis 1:1,5:1:2. Warum so? Innen kleiner weil beim Aufschlagen beide Seiten nah beieinander sind. Unten größer weil die Daumen das untere Blatt bedecken. Gestaltungsraster: Unsichtbares Spalten-/Zeilensystem das alle Elemente ausrichtet und Konsistenz erzeugt. 12er-Grid ist am flexibelsten.","keywords":["struktur","seite","satzspiegel","raster","stege","bund","fuß","konsistenz","12er"]},{"type":"order","q":"Ordne die Satzarten nach ihrer Empfehlung – von \"am besten für Screen\" bis \"nur für sehr kurze Texte\":","steps":["Flattersatz – linksbündig, gleichmäßige Wortabstände, ideal für Screen","Blocksatz – links und rechts bündig, gut für breiten Drucktext mit Silbentrennung","Zentriert – nur für sehr kurze Texte wie Einladungen, Gedichte oder Titel"],"explanation":"Für Screen: immer Flattersatz (gleichmäßige Abstände). Für Druck mit breiten Spalten: Blocksatz mit Silbentrennung. Zentriert nur bei sehr kurzen Texten – nie für Fließtext!"}]},{"id":6,"title":"7 · Bild- und Grafikdaten & Kameratechnik","shortTitle":"Bild, Grafik & Kamera","questions":[{"type":"radio","q":"Was ist der wichtigste Vorteil einer Vektorgrafik gegenüber einer Pixelgrafik?","options":["Bessere Fotodarstellung","Immer kleinere Dateigrößen","Verlustfrei und beliebig skalierbar – kein Qualitätsverlust beim Vergrößern","Mehr Farben möglich"],"correct":[2],"explanation":"Vektorgrafiken basieren auf mathematischen Pfaden – beliebig skalierbar ohne Qualitätsverlust. Ideal für Logos, Icons, Illustrationen."},{"type":"radio","q":"Welche Auflösung ist Standard für professionellen Offsetdruck?","options":["72–96 ppi","150 ppi","300 ppi","600–1200 ppi"],"correct":[2],"explanation":"300 ppi = Standard für Offsetdruck – IMMER einhalten! 72–96 ppi für Web/Screen. 150 ppi Minimum für einfachen Druck. 600–1200 dpi für Strichzeichnungen."},{"type":"radio","q":"Was bedeutet \"effektive Auflösung\"?","options":["Die in Photoshop angezeigte Datei-ppi","Die reale Auflösung nach Skalierung im Layout: eff. ppi = Datei-ppi × (100 ÷ Skalierung%)","Die Auflösung nach dem Drucken","Die maximale Druckmaschinenauflösung"],"correct":[1],"explanation":"Effektive Auflösung: Datei-ppi × (100 ÷ Skalierung%). 300 ppi auf 200% = 150 ppi effektiv → nicht ausreichend! Immer effektive Auflösung im Endformat prüfen, nicht nur die Datei-ppi."},{"type":"radio","q":"Ein Bild hat 300 ppi und wird im Layout auf 200% skaliert. Wie hoch ist die effektive Auflösung?","options":["600 ppi","300 ppi","150 ppi","75 ppi"],"correct":[2],"explanation":"eff. ppi = 300 × (100 ÷ 200) = 300 × 0,5 = 150 ppi → NICHT ausreichend für Offsetdruck (Mindest: 300 ppi)!"},{"type":"checkbox","q":"Welche Dateiformate sind Vektorgrafik-Formate?","options":["JPG","PNG","AI (Adobe Illustrator)","EPS","SVG","TIFF"],"correct":[2,3,4],"explanation":"Vektorformate: AI, EPS, SVG. Pixelformate: JPG, PNG, TIFF, GIF, PSD, WebP, BMP."},{"type":"checkbox","q":"Welche Aussagen zu JPG sind korrekt?","options":["Verlustbehaftete Kompression","Unterstützt volle Alpha-Transparenz","Ideal für Fotos","Qualitätsverlust bei jedem erneuten Abspeichern","Bestes Format für Logos"],"correct":[0,2,3],"explanation":"JPG: verlustbehaftet, gut für Fotos, Qualitätsverlust bei jedem Speichern. Keine Transparenz. Für Logos PNG oder SVG verwenden."},{"type":"radio","q":"Was beschreibt das \"Belichtungsdreieck\" in der Fotografie?","options":["Die drei Primärfarben des Lichts (Rot, Grün, Blau)","Das Zusammenspiel von ISO, Blende und Belichtungszeit – alle drei beeinflussen gemeinsam die Helligkeit","Die drei Grundregeln der Bildkomposition","Die drei Lichtquellen in einem Fotostudio"],"correct":[1],"explanation":"Belichtungsdreieck: ISO (Sensorempfindlichkeit), Blende (Öffnung des Objektivs) und Belichtungszeit arbeiten zusammen. Ändert man einen Wert müssen die anderen angepasst werden."},{"type":"radio","q":"Was bewirkt ein NIEDRIGER ISO-Wert (z.B. ISO 100)?","options":["Viel Bildrauschen, gut für wenig Licht","Wenig Bildrauschen, maximale Qualität – braucht aber viel Licht","Kurze Belichtungszeit automatisch","Große Tiefenschärfe"],"correct":[1],"explanation":"Niedriger ISO (100–200): Wenig Rauschen, maximale Bildqualität. Braucht aber viel Licht (Sonne, Studio). Bei wenig Licht muss ISO erhöht werden – auf Kosten von mehr Rauschen."},{"type":"radio","q":"Was bewirkt eine kleine Blendenzahl (z.B. f/1.8)?","options":["Viel Tiefenschärfe – alles von nah bis weit scharf","Geringe Tiefenschärfe – Hintergrund wird unscharf (Bokeh-Effekt)","Kurze Belichtungszeit","Das Bild wird dunkler"],"correct":[1],"explanation":"Kleine f-Zahl (f/1.8, f/2.8) = große Öffnung = wenig Tiefenschärfe. Hintergrund unscharf (Bokeh). Viel Licht fällt auf den Sensor. Typisch für: Portraits, Produktfotos."},{"type":"radio","q":"Du willst eine Landschaft fotografieren bei der alles von vorne bis hinten scharf sein soll. Welche Blende wählst du?","options":["f/1.8 – für viel Licht","f/2.8 – für Bokeh","f/11 oder f/16 – für viel Tiefenschärfe","f/4 – Mittelweg"],"correct":[2],"explanation":"Für Landschaften: f/11 oder f/16 = kleine Öffnung = viel Tiefenschärfe. Alles von Blumen im Vordergrund bis Berge im Hintergrund scharf. Braucht aber mehr Licht oder längere Belichtungszeit!"},{"type":"radio","q":"Du willst einen Sportler in Bewegung \"einfrieren\" (scharf abbilden). Welche Belichtungszeit wählst du?","options":["1 Sekunde","1/30 Sekunde","1/500 Sekunde oder kürzer","1/100 Sekunde"],"correct":[2],"explanation":"1/500s oder kürzer friert schnelle Bewegung ein. 1/30s würde Bewegungsunschärfe erzeugen. Faustregel: Je schneller die Bewegung, desto kürzer muss die Belichtungszeit sein."},{"type":"radio","q":"Was ist die \"Faustformel gegen Verwackeln\" bei der Belichtungszeit?","options":["Immer mindestens 1/60s verwenden","Belichtungszeit mindestens 1 / Brennweite in Sekunden","Belichtungszeit sollte immer gleich dem ISO-Wert sein","Immer Stativ verwenden ab 1/30s"],"correct":[1],"explanation":"Faustformel: min. 1/Brennweite Sekunden. Bei 50mm Objektiv → mindestens 1/50s. Bei 200mm Tele → mindestens 1/200s. Teleobjektive verstärken Verwackeln daher kürzere Zeit nötig!"},{"type":"radio","q":"Was ist weiches Licht in der Fotografie?","options":["Licht das nur weiße Farbtöne erzeugt","Diffuses Licht ohne harte Schatten – z.B. bewölkter Himmel, Softbox, Reflektor","Direktes Sonnenlicht am Mittag","Licht mit hoher Farbtemperatur (bläulich)"],"correct":[1],"explanation":"Weiches Licht: Diffus, gleichmäßig, kaum harte Schatten. Entsteht bei bewölktem Himmel, durch Softbox im Studio oder Reflektor. Ideal für Portraits. Hartes Licht: Direkte Sonne, direkter Blitz → scharfe Schatten."},{"type":"checkbox","q":"Welche Situationen erfordern einen HOHEN ISO-Wert?","options":["Fotografie bei strahlendem Sonnenschein","Konzertfotografie bei schlechtem Licht","Fotografie in einer Kirche ohne Blitz","Produktfotografie im Studio mit viel Licht","Nachtfotografie ohne Stativ","Sportfotografie in der Halle"],"correct":[1,2,4,5],"explanation":"Hoher ISO nötig bei wenig Licht: Konzerte, Kirchen, Nacht ohne Stativ, Sport in der Halle. Bei viel Licht (Sonne, Studio) immer niedrigen ISO wählen für beste Qualität."},{"type":"text","q":"Erkläre das Belichtungsdreieck: Was sind ISO, Blende und Belichtungszeit und wie hängen sie zusammen?","modelAnswer":"ISO: Sensorempfindlichkeit. Niedriger ISO = wenig Rauschen, braucht viel Licht. Hoher ISO = viel Rauschen, gut bei wenig Licht. Blende (f-Zahl): Öffnung des Objektivs. Kleine Zahl (f/1.8) = große Öffnung = wenig Tiefenschärfe (Bokeh). Große Zahl (f/16) = kleine Öffnung = alles scharf. Belichtungszeit: Kurz (1/500s) = Bewegung einfrieren. Lang (1s) = Bewegungsunschärfe. Zusammenspiel: Alle drei beeinflussen die Helligkeit. Ändert man einen Wert müssen die anderen angepasst werden.","keywords":["iso","blende","belichtungszeit","rauschen","tiefenschärfe","bokeh","einfrieren","helligkeit"]},{"type":"order","q":"Ordne die Kameraeinstellungen nach ihrer Wirkung: von \"steuert Tiefenschärfe\" über \"steuert Rauschen\" zu \"steuert Bewegungsschärfe\":","steps":["Blende (f-Zahl) – steuert Tiefenschärfe und Lichtmenge","ISO – steuert Sensorempfindlichkeit und Bildrauschen","Belichtungszeit – steuert Bewegungsschärfe und Lichtmenge"],"explanation":"Belichtungsdreieck: Blende (Tiefenschärfe/Licht), ISO (Empfindlichkeit/Rauschen), Belichtungszeit (Bewegung/Licht). Alle drei beeinflussen gemeinsam die Helligkeit."},{"type":"text","q":"Erkläre was Vektorgrafik ist, wie sie funktioniert und wann man sie einsetzt.","modelAnswer":"Vektorgrafiken bestehen nicht aus Pixeln sondern aus mathematischen Kurven (Ankerpunkte und Bézierkurven). Dadurch sind sie verlustfrei und beliebig skalierbar – egal ob 1 cm oder 10 m groß, die Qualität bleibt dieselbe. Einsatz: Logos (müssen auf Visitenkarte und Plakatwand funktionieren), Icons, Illustrationen, Diagramme, Schilder. Programme: Adobe Illustrator. Formate: AI, EPS, SVG.","keywords":["mathematisch","kurven","skalierbar","verlustfrei","logo","illustrator","svg","eps"]},{"type":"text","q":"Was ist der ISO-Wert einer Kamera und was passiert bei hohem ISO?","modelAnswer":"Der ISO-Wert beschreibt die Lichtempfindlichkeit des Kamerasensors. Niedriger ISO (100–200): wenig Rauschen, maximale Bildqualität, braucht aber viel Licht (Sonne, Studio). Hoher ISO (1600+): Sensor wird empfindlicher für Licht, gut bei wenig Licht (Konzert, Kirche, Nacht). Nachteil: Bildrauschen nimmt zu (körnige Struktur im Bild). Faustregel: So niedrig wie möglich, so hoch wie nötig.","keywords":["empfindlichkeit","sensor","rauschen","licht","niedrig","hoch","körnung","faustregel"]}]},{"id":7,"title":"8 · Daten für Ausgabeprozesse aufbereiten","shortTitle":"Ausgabeprozesse & Falz","questions":[{"type":"radio","q":"Was ist Breitbahn (BB) bei der Laufrichtung?","options":["Laufrichtung parallel zur kurzen Seite","Laufrichtung parallel zur langen Seite","Das Papier hat keine definierte Laufrichtung","Breitbahn bedeutet das Papier ist sehr breit"],"correct":[1],"explanation":"Breitbahn (BB): Laufrichtung parallel zur langen Seite. Schmalbahn (SB): parallel zur kurzen Seite. Beispiel: 70×100 BB = Laufrichtung parallel zur 100 cm Seite."},{"type":"radio","q":"Warum ist die Laufrichtung beim Falzen so wichtig?","options":["Sie beeinflusst das Papiergewicht","Quer zur Laufrichtung falzen → Papier bricht oder knittert! Immer parallel falzen.","Die Druckqualität hängt von der Laufrichtung ab","Nur bei Papier über 200 g/m² relevant"],"correct":[1],"explanation":"Quer zur Laufrichtung falzen → Papier bricht, knittert, sieht schlecht aus. Immer parallel zur Laufrichtung falzen! Besonders wichtig bei dickerem Papier und Karton."},{"type":"radio","q":"Was ist der Einbruchfalz (Einfachfalz)?","options":["Drei Panels in eine Richtung gefaltet","Ein Blatt einmal in der Mitte gefaltet → 2 gleiche Hälften, 4 Seiten","Zweimal rechtwinklig gefaltet","Falze wechseln die Richtung"],"correct":[1],"explanation":"Einbruchfalz: Einfachstes Falzprinzip. Ein Blatt einmal in der Mitte falten → 2 gleiche Hälften, 4 Seiten gesamt. Einsatz: einfache Beilagen, Einladungen, Grußkarten."},{"type":"radio","q":"Was ist der Unterschied zwischen Wickelfalz und Zickzackfalz?","options":["Es gibt keinen Unterschied","Wickelfalz: alle Panels gleich breit. Zickzackfalz: Panels werden innen schmaler.","Wickelfalz: Parallelfalze in dieselbe Richtung (innere Panels schmaler). Zickzackfalz: Falze wechseln die Richtung, alle Panels gleich breit.","Zickzackfalz hat mehr Seiten als Wickelfalz"],"correct":[2],"explanation":"Wickelfalz: Mehrere Parallelfalze in DIESELBE Richtung – innere Panels müssen schmaler sein damit sie sich einrollen können. Zickzackfalz: Falze wechseln die Richtung (wie Akkordeon) – alle Panels gleich breit!"},{"type":"radio","q":"Wie viele Seiten hat ein Kreuzfalz?","options":["4 Seiten","6 Seiten","8 Seiten","12 Seiten"],"correct":[2],"explanation":"Kreuzfalz: Zweimal gefaltet (der zweite Falz steht 90° zum ersten) = 4 Lagen = 8 Seiten. Wie ein einfaches kleines Heft. Einsatz: Grußkarten, einfache Broschüren."},{"type":"radio","q":"Was ist ein Fensterfalz (Altarfalz)?","options":["Ein Blatt mit einem Ausschnitt in der Mitte","Die beiden Außenpanels klappen nach innen zur Mitte – wie Fensterläden. Mittelpanel ist breiter.","Drei gleiche Panels die alle nach links gefaltet werden","Ein einfacher Einbruchfalz mit Fensterausschnitt"],"correct":[1],"explanation":"Fensterfalz: Beide Außenseiten klappen nach innen zur Mitte (wie Fensterläden oder Altarflügel). Das Mittelpanel ist breiter. Wirkung: elegant, Überraschungseffekt beim Öffnen. 6 Seiten."},{"type":"radio","q":"Für welchen Einsatz ist der Zickzackfalz/Leporellofalz besonders geeignet?","options":["Dicke Bücher","Landkarten und Flyer die vollständig aufgezogen werden können","Nur für Einladungen","Zeitschriften mit vielen Seiten"],"correct":[1],"explanation":"Zickzackfalz: Alle Panels gleich breit, kann komplett auseinander gezogen werden. Ideal für Landkarten, Bilderbücher, Produktübersichten, Zeitstrahlen."},{"type":"checkbox","q":"Welche Falzarten kennst du? (Alle richtigen auswählen)","options":["Einbruchfalz (Einfachfalz)","Auflösungsfalz","Wickelfalz (Rollenfalz)","Zickzackfalz / Leporellofalz","Kerningfalz","Kreuzfalz","Fensterfalz (Altarfalz)"],"correct":[0,2,3,5,6],"explanation":"Falzarten: Einbruchfalz, Wickelfalz, Zickzackfalz/Leporello, Kreuzfalz, Fensterfalz/Altarfalz, Doppelter Parallelfalz. Auflösungsfalz und Kerningfalz existieren nicht."},{"type":"text","q":"Erkläre den Unterschied zwischen Beschnitt (Bleed) und Sicherheitsabstand.","modelAnswer":"Beschnitt (3–5 mm): Farbflächen, Bilder und Hintergründe müssen 3–5 mm über den Endformat-Rand hinausgehen. Grund: Schneidemaschinen schneiden nicht exakt – ohne Beschnitt entstehen weiße Ränder. Sicherheitsabstand (3–5 mm): Wichtige Inhalte (Text, Logos) müssen mindestens 3–5 mm vom Endformat-Rand entfernt sein. Sonst besteht Risiko des Abschneidens.","keywords":["beschnitt","bleed","sicherheitsabstand","3","schneiden","rand","weiß"]},{"type":"radio","q":"Was ist der Unterschied zwischen PDF/X-1a und PDF/X-4?","options":["Beide sind identisch, nur verschiedene Versionsnummern","PDF/X-1a: nur CMYK, keine Transparenz, Schriften eingebettet. PDF/X-4: erlaubt Transparenz und Ebenen – aktueller Standard.","PDF/X-4 ist älter als PDF/X-1a","PDF/X-1a erlaubt Transparenzen, PDF/X-4 nicht"],"correct":[1],"explanation":"PDF/X-1a: Älterer Standard. Nur CMYK, keine Transparenz (wird geflacht), Schriften eingebettet – sicher aber eingeschränkt. PDF/X-4: Aktuell empfohlen. Transparenz und Ebenen erlaubt."},{"type":"radio","q":"Was ist Rückendrahtheftung?","options":["Seiten werden mit Kleber verbunden","Zwei Drahtklammern am Rücken – bis ca. 64 Seiten, günstig für Broschüren","Fester Einband aus Pappe","Spiralbindung mit Metalldraht"],"correct":[1],"explanation":"Rückendrahtheftung: Zwei Drahtklammern am Rücken (wie Heftklammern). Günstigste Bindeart, bis ca. 64 Seiten. Typisch für Broschüren und Hefte."},{"type":"radio","q":"Wofür wird Siebdruck eingesetzt?","options":["Sehr hohe Auflagen von Zeitschriften","Personalisierte Digitaldrucke","Textilien, Schilder, unebene Flächen – Pantone-Sonderfarben möglich","Verpackungsdruck auf Folien"],"correct":[2],"explanation":"Siebdruck: Farbe durch eine Schablone (Sieb) gedrückt. Ideal für Textilien (T-Shirts), Schilder, unebene Flächen, Glas, Keramik. Pantone-Sonderfarben möglich."},{"type":"checkbox","q":"Was gehört zur Druckdaten-Checkliste?","options":["CMYK-Farbraum (RGB vorher konvertieren)","Auflösung 300 ppi (effektive prüfen!)","Datei als DOCX speichern","3 mm Beschnitt","Schriften einbetten oder als Pfade","ICC-Profil ISO Coated v2 einbetten"],"correct":[0,1,3,4,5],"explanation":"Druckdaten: CMYK, 300 ppi eff., 3 mm Beschnitt, 3 mm Sicherheitsabstand, Schriften eingebettet/Pfade, ICC-Profil (ISO Coated v2), Preflight. DOCX ist kein Druckformat!"},{"type":"text","q":"Erkläre wann man Offsetdruck und wann Digitaldruck wählt.","modelAnswer":"Offsetdruck: Druckplatten werden erstellt (Rüstkosten), dann sehr günstig bei großen Auflagen. Wirtschaftlich ab mittleren Auflagen (ca. 500+). Hohe Qualität und Konsistenz. Digitaldruck: Keine Druckplatten – direkte Ausgabe (Laser/Inkjet). Günstig für kleine Auflagen und personalisierte Drucksachen. Keine Rüstkosten. Für variable Daten (z.B. personalisierte Briefe) unverzichtbar.","keywords":["offset","digital","auflage","druckplatten","rüstkosten","klein","groß","personalisiert"]},{"type":"order","q":"Bringe die Schritte der Druckdatenvorbereitung in die richtige Reihenfolge:","steps":["Design im richtigen Farbmodus (CMYK) anlegen","Bilder mit 300 ppi in Endgröße einbinden","3 mm Beschnitt und 3 mm Sicherheitsabstand anlegen","Schriften einbetten oder in Pfade umwandeln","ICC-Profil ISO Coated v2 einbetten","Preflight-Check durchführen","Als PDF/X-4 exportieren und an Druckerei senden"],"explanation":"Druckdatenvorbereitung: CMYK anlegen → 300 ppi Bilder → Beschnitt/Sicherheitsabstand → Schriften → ICC-Profil → Preflight → PDF/X-4 Export."},{"type":"order","q":"Ordne die Falzarten von einfachst (ein Falz) bis komplexest (zwei Falze in verschiedene Richtungen):","steps":["Einbruchfalz – 1 Falz in der Mitte, 4 Seiten","Wickelfalz – mehrere Parallelfalze in eine Richtung, 6–8 Seiten","Zickzackfalz – Falze wechseln die Richtung, 6+ Seiten","Kreuzfalz – 2 Falze im 90°-Winkel zueinander, 8 Seiten","Fensterfalz – Außenseiten klappen nach innen, 6 Seiten"],"explanation":"Einbruchfalz (einfachst) → Wickelfalz (parallel) → Zickzack (wechselnd) → Kreuzfalz (rechtwinklig) → Fensterfalz (nach innen). Komplexität nimmt zu durch mehr Falze und spezielle Panelbreiten."},{"type":"text","q":"Was ist der Unterschied zwischen Offsetdruck und Digitaldruck? Wann nimmt man welchen?","modelAnswer":"Offsetdruck: Druckplatten werden erstellt (= Rüstkosten). Sehr günstig pro Stück bei hohen Auflagen ab ca. 500 Exemplaren. Hohe, konsistente Qualität. Für Broschüren, Zeitschriften, Bücher. Digitaldruck: Direkte Ausgabe ohne Druckplatten. Keine Rüstkosten. Günstig für kleine Auflagen (auch 1 Exemplar). Variable Daten möglich (personalisierte Drucksachen). Für kleine Auflagen, Prototypen, personalisierte Mailings.","keywords":["druckplatten","rüstkosten","auflage","günstig","personalisiert","variabel","offset","digital"]},{"type":"text","q":"Was ist ein Wickelfalz und was muss der Designer beim Layout beachten?","modelAnswer":"Beim Wickelfalz werden mehrere Falze parallel in dieselbe Richtung gefaltet, sodass sich jede Lage um die vorherige \"wickelt\". Wichtig für den Designer: Die inneren Panels müssen schmaler sein (ca. 2–3 mm) als die äußeren, damit das Papier sich falten kann ohne zu knicken. Beim klassischen DIN-Lang-Flyer aus A4 mit 3 Panels: Das innerste Panel muss ca. 97 mm breit sein, das mittlere ca. 98 mm, das äußerste 99 mm.","keywords":["parallel","wickelt","schmaler","panel","breite","din lang","2-3 mm","innen"]}]},{"id":8,"title":"9 · Farbmodelle & Farbkontraste","shortTitle":"Farbe","questions":[{"type":"radio","q":"Was ist der Unterschied zwischen additiver (RGB) und subtraktiver (CMYK) Farbmischung?","options":["RGB ist für Druck, CMYK für Bildschirme","RGB addiert Lichtfarben → alle max = Weiß. CMYK absorbiert Licht → alle max = Tiefschwarz.","Beide Modelle funktionieren identisch","RGB hat mehr Farben als CMYK"],"correct":[1],"explanation":"Additiv (RGB): Lichtfarben addieren sich → alle max = Weiß, alle 0 = Schwarz. Einsatz: Monitore, Beamer, LED. Subtraktiv (CMYK): Druckfarben absorbieren Licht → deshalb K extra, da CMY zusammen nur Dunkelbraun ergibt."},{"type":"radio","q":"Warum wird im CMYK-Druck ein separates Schwarz (K) hinzugefügt?","options":["Weil CMY zu teuer ist","CMY ergibt zusammen in der Praxis nur schmutziges Dunkelbraun – K liefert sauberes Tiefschwarz und ist wirtschaftlicher","Weil Schwarz die wichtigste Farbe ist","K wird nur für schwarze Schriften verwendet"],"correct":[1],"explanation":"CMY zusammen = theoretisch Schwarz, in Praxis aber schmutziges Dunkelbraun (Druckfarben nie 100% rein). Außerdem: Zu viel Farbe trocknet schlecht. Daher K extra für sauberes Tiefschwarz und sparsamere Tintennutzung."},{"type":"radio","q":"Was ist das HSB-Farbmodell?","options":["Ein Druckfarbmodell für Siebdruck","Hue (Farbton 0–360°), Saturation (Sättigung 0–100%), Brightness (Helligkeit 0–100%) – intuitiv für Menschen","Ein deutsches Sonderfarben-System","Ein Modell für Schwarzweißfotografie"],"correct":[1],"explanation":"HSB: Hue=Farbton (0–360°), Saturation=Sättigung, Brightness=Helligkeit. Intuitiver als RGB/CMYK weil es so beschreibt wie Menschen Farbe wahrnehmen."},{"type":"radio","q":"Was ist der Komplementärkontrast nach Itten?","options":["Hell gegen dunkel – Schwarz auf Weiß","Gegenüberliegende Farben im Farbkreis (Rot & Grün, Blau & Orange) – maximale Farbspannung","Gesättigte neben ungesättigter Farbe","Warme neben kalten Farben"],"correct":[1],"explanation":"Komplementärkontrast (Itten Nr. 4): Gegenüberliegende Farben im Farbkreis. Rot/Grün, Blau/Orange, Gelb/Violett. Maximale Spannung – sehr lebendig und anspruchsvoll zu kombinieren."},{"type":"radio","q":"Was beschreibt der Simultankontrast?","options":["Zwei bunte Farben gleichzeitig zeigen","Dieselbe Farbe wirkt je nach Umgebungsfarbe unterschiedlich (Grau auf Rot wirkt grünlich)","Hell-Dunkel-Unterschied zwischen zwei Flächen","Unterschiedlich große Farbflächen"],"correct":[1],"explanation":"Simultankontrast (Itten Nr. 5): Dieselbe Farbe wirkt in verschiedenen Umgebungen anders. Grau auf rotem Hintergrund bekommt einen grünlichen Stich – das Gehirn ergänzt die Komplementärfarbe."},{"type":"checkbox","q":"Welche Farbkontraste nach Itten sind korrekt benannt?","options":["Farbe-an-sich-Kontrast","Hell-Dunkel-Kontrast","Auflösungskontrast","Kalt-Warm-Kontrast","Komplementärkontrast","Kerningkontrast","Quantitätskontrast"],"correct":[0,1,3,4,6],"explanation":"Ittens 7 Kontraste: 1. Farbe-an-sich, 2. Hell-Dunkel, 3. Kalt-Warm, 4. Komplementär, 5. Simultan, 6. Qualitätskontrast, 7. Quantitätskontrast. Auflösungs- und Kerningkontrast existieren nicht."},{"type":"text","q":"Erkläre den Merksatz F-H-K-K-S-Q-Q für Ittens Farbkontraste.","modelAnswer":"F = Farbe-an-sich-Kontrast (bunte Grundfarben nebeneinander). H = Hell-Dunkel-Kontrast (hell gegen dunkel). K = Kalt-Warm-Kontrast (warme vs. kalte Farben). K = Komplementärkontrast (gegenüberliegende Farben im Farbkreis). S = Simultankontrast (gleiche Farbe wirkt je nach Umgebung anders). Q = Qualitätskontrast (gesättigte vs. gebrochene Farbe). Q = Quantitätskontrast (unterschiedliche Farbflächen).","keywords":["farbe-an-sich","hell-dunkel","kalt-warm","komplementär","simultan","qualität","quantität"]},{"type":"radio","q":"Was ist Pantone (PMS)?","options":["Ein deutsches Druckfarbensystem","Ein weltweites Sonderfarben-System mit eindeutigen Farbnummern (z.B. Pantone 485 = kräftiges Rot)","Eine Methode zur digitalen Farbkorrektur","Ein Farbmodell speziell für Webdesign"],"correct":[1],"explanation":"Pantone (PMS = Pantone Matching System): Weltweiter Standard für Sonderfarben. Eindeutige Nummern sichern exakte Farbwiedergabe weltweit – unabhängig von Druckmaschine oder Region."},{"type":"radio","q":"Wie funktioniert das Hexadezimal-Farbsystem im Web?","options":["#CMYK mit 4 Stellen","#RRGGBB mit je 2 Stellen für Rot, Grün, Blau (0–FF = 0–255)","Prozentangaben von 0–100","Eine Tabelle mit 16 Webfarben"],"correct":[1],"explanation":"Hexadezimal: #RRGGBB. Je 2 Stellen für R, G, B in hexadezimaler Schreibweise (0–FF = 0–255). Beispiel: #FF0000 = reines Rot. #000000 = Schwarz. #FFFFFF = Weiß."},{"type":"radio","q":"Was ist HKS?","options":["Ein englisches Farbsystem für Textildruck","Ein deutsches Sonderfarben-System (K=Kunstdruck, N=Normal, Z=Zeitung)","Ein digitales Farbmodell für Web-Animationen","Eine Methode zur Monitorkalibrierung"],"correct":[1],"explanation":"HKS: Deutsches Sonderfarben-System mit definierten Farbtönen für verschiedene Papiersorten. K=Kunstdruck (gestrichenes Papier), N=Normalpapier, Z=Zeitungsdruck."},{"type":"radio","q":"Was ist Lab (CIELab)?","options":["Ein Modell für Laborfarben in der Chemie","Ein geräteunabhängiger Referenzfarbraum – Basis für ICC-Farbprofilkonvertierungen","Ein vereinfachtes RGB-Modell","Ein Modell für Neonfarben"],"correct":[1],"explanation":"Lab (CIELab): Geräteunabhängig – beschreibt Farben so wie der Mensch sie wahrnimmt. Dient als neutraler Referenzfarbraum bei ICC-Farbprofilkonvertierungen zwischen verschiedenen Geräten."},{"type":"checkbox","q":"Welche kulturellen Farbwirkungen sind korrekt laut Lernzettel?","options":["Weiß = Trauer in Asien","Rot = Gefahr überall auf der Welt gleich","Rot = Glück und Freude in China","Farbwirkung ist kulturabhängig!","Grün hat überall dieselbe Bedeutung"],"correct":[0,2,3],"explanation":"Laut Lernzettel: Weiß = Trauer in Asien (nicht Reinheit wie in Europa). Rot = Glück in China (nicht Gefahr). Farbwirkung ist IMMER kulturabhängig – beim Gestalten für internationale Zielgruppen beachten!"},{"type":"text","q":"Erkläre den Unterschied zwischen RGB und CMYK: Wann nutzt man welches Modell?","modelAnswer":"RGB (Rot, Grün, Blau) = additiv = Lichtfarben. Alle Kanäle auf Maximum = Weiß. Einsatz: Monitore, Beamer, LEDs, Webgrafiken. CMYK (Cyan, Magenta, Yellow, Black) = subtraktiv = Druckfarben. Farben absorbieren Licht. K extra weil CMY zusammen nur Dunkelbraun ergibt. Einsatz: Offsetdruck, Digitaldruck, alle Printprodukte. Regel: Webgrafiken in RGB anlegen, Druckdaten IMMER in CMYK.","keywords":["rgb","cmyk","additiv","subtraktiv","licht","druck","weiß","schwarz","web","print"]},{"type":"order","q":"Ordne die Farbmodelle nach ihrem typischen Einsatz – von Screen/Web über Druck zu Sonderfarben:","steps":["RGB – Bildschirme, Monitore, Web, LEDs","CMYK – Offset-, Digital- und Siebdruck","HKS – deutsches Sonderfarben-System für Druckereien","Pantone (PMS) – weltweites Sonderfarben-System","Lab (CIELab) – geräteunabhängiger Referenzfarbraum für ICC-Konvertierungen"],"explanation":"Farbmodelle nach Einsatz: RGB (Licht/Screen) → CMYK (Druck) → HKS/Pantone (Sonderfarben, exakte Unternehmensfarben) → Lab (Referenzfarbraum, geräteunabhängig für Konvertierungen)."},{"type":"order","q":"Ordne Ittens Farbkontraste nach dem Merksatz F-H-K-K-S-Q-Q:","steps":["F – Farbe-an-sich-Kontrast: bunte Grundfarben nebeneinander","H – Hell-Dunkel-Kontrast: hell gegen dunkel","K – Kalt-Warm-Kontrast: warme vs. kalte Farben","K – Komplementärkontrast: gegenüberliegende Farben im Farbkreis","S – Simultankontrast: gleiche Farbe wirkt in verschiedener Umgebung anders","Q – Qualitätskontrast: gesättigte vs. gebrochene Farbe","Q – Quantitätskontrast: unterschiedliche Farbflächengrößen"],"explanation":"Ittens 7 Kontraste: F-H-K-K-S-Q-Q. Merkhilfe: Farbe – Hell – Kalt – Komplement – Simultan – Qualität – Quantität."},{"type":"text","q":"Erkläre was RGB bedeutet und warum es für Bildschirme genutzt wird.","modelAnswer":"RGB steht für Rot, Grün, Blau – die drei Grundfarben des Lichts. Es ist ein additives Farbmodell: Je mehr Licht, desto heller. Alle drei Kanäle auf Maximum (255,255,255) = Weiß. Alle auf 0 = Schwarz (kein Licht). Für Bildschirme genutzt weil Monitore, LEDs und Beamer selbst Licht erzeugen – sie leuchten. Jeder Kanal hat 256 Stufen (0–255). Hexadezimal: #RRGGBB. Wichtig: Druckdaten immer von RGB nach CMYK konvertieren!","keywords":["rot","grün","blau","additiv","licht","255","schwarz","weiß","bildschirm","cmyk konvertieren"]},{"type":"text","q":"Was ist der Simultan- und was der Komplementärkontrast nach Itten?","modelAnswer":"Simultankontrast: Dieselbe Farbe wirkt je nach Umgebungsfarbe unterschiedlich. Beispiel: Grau auf rotem Hintergrund bekommt einen grünlichen Stich, weil das Gehirn die Komplementärfarbe ergänzt. Regel: Farben nie isoliert beurteilen – immer im Kontext. Komplementärkontrast: Farben die sich im Farbkreis direkt gegenüberliegen (Rot–Gr
